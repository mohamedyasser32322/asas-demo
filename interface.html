<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script src="mock/mock-api.js?v=15"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مشاريعنا</title>
  <link rel="stylesheet" href="config/light-overrides.css"/>
  <link rel="stylesheet" href="config/polish.css"/>
  <script src="config/themes.js"></script>
  <script src="config/brand.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #0D2142;
      --primary-deep: #081830;
      --card-bg:      #112952;
      --border:       rgba(var(--fg-rgb), 0.08);
      --light:        #FFFFFF;
      --fg-rgb:       255, 255, 255;
      --text-muted:   #8fa3c0;
      --success:      #34c759;
      --warning:      #ffcc00;
      --danger:       #ff3b30;
      --accent:       #4e8df5;
      --transition:   all 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--primary); }
    ::-webkit-scrollbar-thumb { background: rgba(var(--fg-rgb), 0.12); border-radius: 8px; border: 2px solid var(--primary); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(var(--fg-rgb), 0.22); }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--primary-deep);
      color: var(--light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:scale(1); } }

    /* ════ HEADER ════════════════════════════════════════════ */
    header {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(var(--bg-rgb),0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px;
    }
    .nav-logo {
      font-size: 1.45rem; font-weight: 900; color: var(--light);
      cursor: pointer; display: flex; align-items: center; gap: 10px;
    }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .nav-center { font-size: 1rem; font-weight: 700; color: var(--text-muted); }
    .login-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(78,141,245,0.12); color: var(--accent);
      border: 1px solid rgba(78,141,245,0.3);
      padding: 9px 22px; border-radius: 10px;
      text-decoration: none; font-weight: 700; font-size: 0.9rem;
      transition: var(--transition);
    }
    .login-btn:hover { background: rgba(78,141,245,0.22); border-color: var(--accent); transform: translateY(-2px); }

    /* ════ STATS ═════════════════════════════════════════════ */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 14px;
      padding: 20px 40px 16px;
    }
    .stat-chip {
      display: flex; align-items: center; gap: 16px;
      background: rgba(var(--bg-rgb),0.6); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 22px;
      backdrop-filter: blur(10px);
      transition: var(--transition);
    }
    .stat-chip:hover { background: rgba(var(--bg-rgb),0.85); border-color: rgba(var(--fg-rgb), 0.15); transform: translateY(-2px); }
    .stat-chip-icon {
      width: 48px; height: 48px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .sci-total { background: rgba(78,141,245,0.18); color: var(--accent); }
    .sci-avail { background: rgba(52,199,89,0.18);  color: var(--success); }
    .sci-resrv { background: rgba(255,204,0,0.15);  color: var(--warning); }
    .sci-sold  { background: rgba(255,59,48,0.15);  color: var(--danger); }
    .stat-chip-text { display: flex; flex-direction: column; gap: 2px; }
    .stat-chip-num { font-size: 1.75rem; font-weight: 900; line-height: 1; }
    .scn-total { color: var(--light); }
    .scn-avail { color: var(--success); }
    .scn-resrv { color: var(--warning); }
    .scn-sold  { color: var(--danger); }
    .stat-chip-lbl { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
    @media (max-width: 900px) { .stats-bar { grid-template-columns: repeat(2,1fr); padding: 16px 20px 12px; } }
    @media (max-width: 480px) { .stats-bar { grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px; } }

    /* ════ FILTER ════════════════════════════════════════════ */
    .filter-section { padding: 4px 40px 18px; }
    .filter-card {
      background: rgba(var(--bg-rgb),0.65); border: 1px solid rgba(var(--fg-rgb), 0.09);
      border-radius: 18px; padding: 16px 22px;
      backdrop-filter: blur(12px); box-shadow: 0 6px 28px rgba(0,0,0,0.28);
    }
    /* صف الفلاتر — يلتفّ في صفوف بنعومة، بدون سكرول */
    .filter-row {
      display: flex; flex-wrap: wrap; align-items: flex-end;
      gap: 14px 18px;
    }
    .filter-group {
      display: flex; flex-direction: column; gap: 6px;
      flex: 0 0 auto;
    }
    .filter-row > .clear-btn { align-self: flex-end; }
    .filter-sep {
      width: 1px; height: 38px; background: rgba(var(--fg-rgb), 0.1);
      flex-shrink: 0; align-self: center;
    }
    .filter-label {
      font-size: 0.68rem; color: var(--text-muted); font-weight: 700;
      letter-spacing: 0.6px; text-transform: uppercase; white-space: nowrap;
    }

    /* control height = 38px for everything */
    .filter-select {
      height: 38px;
      background: rgba(var(--fg-rgb), 0.06); color: var(--light);
      border: 1px solid rgba(var(--fg-rgb), 0.12);
      padding: 0 12px 0 30px; border-radius: 10px;
      cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.86rem;
      outline: none; appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238fa3c0' stroke-width='2.5'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: left 8px center; background-size: 12px;
      color-scheme: dark; transition: var(--transition); min-width: 150px;
    }
    .filter-select option { background: var(--primary); }
    .filter-select:hover { background-color: rgba(var(--fg-rgb), 0.1); border-color: rgba(var(--fg-rgb), 0.22); }
    .filter-select:focus { outline: none; border-color: rgba(78,141,245,0.5); }
    .filter-select.sm { min-width: 100px; }

    .pill-group { display: flex; gap: 5px; }
    .pill {
      height: 38px; padding: 0 14px; border-radius: 10px; cursor: pointer;
      font-family: inherit; font-weight: 700; font-size: 0.82rem;
      border: 1.5px solid rgba(var(--fg-rgb), 0.1);
      background: rgba(var(--fg-rgb), 0.04); color: var(--text-muted);
      transition: var(--transition); white-space: nowrap;
      display: flex; align-items: center;
    }
    .pill:hover { background: rgba(var(--fg-rgb), 0.1); color: var(--light); }
    .pill.active { background: rgba(var(--fg-rgb), 0.13); color: var(--light); border-color: rgba(var(--fg-rgb), 0.35); }
    .pill.avail.active { background: rgba(52,199,89,0.16);  color: var(--success); border-color: rgba(52,199,89,0.6); }
    .pill.resrv.active { background: rgba(255,204,0,0.13);  color: var(--warning); border-color: rgba(255,204,0,0.5); }

    .price-range { display: flex; align-items: center; gap: 6px; }
    .price-input {
      width: 95px; height: 38px;
      background: rgba(var(--fg-rgb), 0.06); color: var(--light);
      border: 1px solid rgba(var(--fg-rgb), 0.12); padding: 0 10px;
      border-radius: 10px; font-family: inherit; font-size: 0.86rem; font-weight: 600;
      outline: none; transition: var(--transition); text-align: center;
    }
    .price-input::placeholder { color: var(--text-muted); }
    .price-input::-webkit-inner-spin-button, .price-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .price-input:focus { border-color: rgba(78,141,245,0.5); }
    .price-sep { color: var(--text-muted); font-weight: 700; flex-shrink: 0; font-size: 0.9rem; }

    .clear-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,59,48,0.09); color: var(--danger);
      border: 1px solid rgba(255,59,48,0.25); padding: 0 16px; height: 38px;
      border-radius: 10px; cursor: pointer; font-family: inherit;
      font-weight: 700; font-size: 0.83rem; transition: var(--transition); white-space: nowrap;
    }
    .clear-btn:hover { background: rgba(255,59,48,0.18); transform: translateY(-1px); }
    /* filter top-row legacy (للموبايل) */
    .filter-top-row { display: none; }

    /* ════ BREADCRUMB ════════════════════════════════════════ */
    .breadcrumb-wrap { padding: 0 40px 10px; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
    .bc-item { cursor: pointer; color: var(--text-muted); transition: var(--transition); }
    .bc-item:hover { color: var(--light); }
    .bc-sep { color: var(--text-muted); opacity: 0.35; }
    .bc-current { color: var(--light); font-weight: 700; cursor: default; }

    /* ════ CONTAINER ═════════════════════════════════════════ */
    .container { padding: 0 40px 80px; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .results-count { font-size: 0.88rem; color: var(--text-muted); font-weight: 600; }
    .results-count strong { color: var(--light); }
    .sort-select {
      background: rgba(var(--fg-rgb), 0.05); color: var(--light);
      border: 1px solid rgba(var(--fg-rgb), 0.1); padding: 7px 13px 7px 32px; border-radius: 9px;
      font-family: inherit; font-weight: 600; font-size: 0.83rem;
      outline: none; appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238fa3c0' stroke-width='2.5'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: left 7px center; background-size: 12px;
      color-scheme: dark; cursor: pointer;
    }
    .sort-select option { background: var(--primary); }

    #mainView { min-height: 200px; }

    /* ════ PROJECT / BUILDING CARDS ══════════════════════════ */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px,1fr)); gap: 22px; }

    .proj-card {
      background: var(--card-bg); border-radius: 18px;
      border: 1px solid var(--border); padding: 26px; cursor: pointer;
      opacity: 0; animation: fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
      transition: var(--transition);
    }
    .proj-card:hover { transform: translateY(-8px) scale(1.018); border-color: rgba(var(--fg-rgb), 0.28); box-shadow: 0 20px 44px rgba(0,0,0,0.5); }
    .proj-card h3 { font-size: 1.35rem; font-weight: 800; margin-bottom: 8px; }
    .proj-card .meta { font-size: 0.86rem; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .proj-card .desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 18px; line-height: 1.55; }
    .proj-stats { display: flex; justify-content: space-between; border-top: 1px solid rgba(var(--fg-rgb), 0.06); padding-top: 14px; gap: 4px; }
    .ps-box { text-align: center; flex: 1; }
    .ps-num { font-weight: 900; font-size: 1.05rem; margin-bottom: 2px; }
    .ps-lbl { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .ps-total .ps-num { color: var(--light); }        .ps-total .ps-lbl { color: var(--text-muted); }
    .ps-avail .ps-num { color: var(--success); }      .ps-avail .ps-lbl { color: var(--success); opacity:.7; }
    .ps-resrv .ps-num { color: var(--warning); }      .ps-resrv .ps-lbl { color: var(--warning); opacity:.7; }
    .ps-sold  .ps-num { color: var(--danger); }        .ps-sold  .ps-lbl { color: var(--danger); opacity:.7; }

    /* ════ FLOOR MAP ═════════════════════════════════════════ */
    .building-map { display: flex; flex-direction: column; gap: 14px; }
    .floor-row {
      background: rgba(var(--fg-rgb), 0.02); border-radius: 14px;
      border: 1px solid rgba(var(--fg-rgb), 0.05); overflow: hidden;
      opacity: 0; animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .floor-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 18px; background: rgba(var(--fg-rgb), 0.02);
      border-bottom: 1px solid rgba(var(--fg-rgb), 0.05);
    }
    .floor-label { font-weight: 800; font-size: 0.92rem; display: flex; align-items: center; gap: 8px; }
    .floor-label::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--accent); display:inline-block; }
    .floor-count { font-size: 0.72rem; color: var(--text-muted); background: rgba(var(--fg-rgb), 0.05); padding: 3px 10px; border-radius: 20px; }
    .units-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 13px 18px; direction: rtl; }

    /* unit box */
    .unit-box {
      flex: 0 0 auto; width: 118px; border-radius: 10px;
      border: 1.5px solid rgba(var(--fg-rgb), 0.1);
      transition: transform .2s, box-shadow .2s, border-color .2s;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .unit-box-top    { padding: 9px 10px 7px 12px; flex: 1; display: flex; flex-direction: column; }
    .unit-box-bottom { display: flex; align-items: center; gap: 5px; padding: 5px 10px 5px 12px; border-top: 1px solid rgba(var(--fg-rgb), 0.06); }
    .u-num-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
    .u-num  { font-weight: 800; font-size: 0.98rem; color: var(--light); line-height: 1.1; }
    .u-type-badge { display: inline-block; font-size: .58rem; padding: 2px 5px; border-radius: 20px; font-weight: 700; white-space: nowrap; line-height: 1.4; }
    .u-type-apt  { background: rgba(78,141,245,.14); color: rgba(120,170,255,.9); border: 1px solid rgba(78,141,245,.28); }
    .u-type-roof { background: rgba(155,89,182,.18); color: #c39bd3; border: 1px solid rgba(155,89,182,.32); }
    .u-divider   { height: 1px; background: rgba(var(--fg-rgb), 0.06); margin: 4px 0; }
    .u-info-row  { font-size: .68rem; color: var(--text-muted); margin-bottom: 1px; }
    .u-status-dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .u-status-text { font-size: .7rem; font-weight: 700; flex: 1; }
    .u-price-text  { font-size: .6rem; color: var(--text-muted); white-space: nowrap; }

    /* available */
    .unit-box.st-available .unit-box-top { background: rgba(52,199,89,.06); }
    .unit-box.st-available { border-color: rgba(52,199,89,.28); cursor: pointer; }
    .unit-box.st-available:hover { border-color: var(--success); transform: scale(1.06); box-shadow: 0 8px 20px rgba(52,199,89,.18); }
    .unit-box.st-available .u-status-dot  { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .unit-box.st-available .u-status-text { color: rgba(52,199,89,.9); }

    /* reserved */
    .unit-box.st-reserved .unit-box-top { background: rgba(255,204,0,.06); }
    .unit-box.st-reserved { border-color: rgba(255,204,0,.28); cursor: pointer; }
    .unit-box.st-reserved:hover { border-color: var(--warning); transform: scale(1.06); box-shadow: 0 8px 20px rgba(255,204,0,.15); }
    .unit-box.st-reserved .u-status-dot  { background: var(--warning); box-shadow: 0 0 5px var(--warning); }
    .unit-box.st-reserved .u-status-text { color: rgba(255,204,0,.9); }

    /* sold — red, no click */
    .unit-box.st-sold .unit-box-top { background: rgba(255,59,48,.07); }
    .unit-box.st-sold { border-color: rgba(255,59,48,.35); opacity: 0.72; cursor: default; }
    .unit-box.st-sold .u-status-dot  { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
    .unit-box.st-sold .u-status-text { color: rgba(255,59,48,.9); }

    .floor-legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 7px 18px; border-top: 1px solid rgba(var(--fg-rgb), 0.04); background: rgba(var(--fg-rgb), 0.01); }
    .legend-item  { display: flex; align-items: center; gap: 4px; font-size: .7rem; color: var(--text-muted); }
    .legend-dot   { width: 6px; height: 6px; border-radius: 50%; }

    /* ════ SEARCH RESULT CARDS ═══════════════════════════════ */
    .units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 20px; }

    .unit-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; cursor: pointer;
      opacity: 0; animation: fadeUp 0.42s cubic-bezier(0.4,0,0.2,1) forwards;
      transition: var(--transition); display: flex; flex-direction: column;
    }
    .unit-card:hover:not(.is-sold) { transform: translateY(-7px) scale(1.013); border-color: rgba(var(--fg-rgb), 0.22); box-shadow: 0 18px 40px rgba(0,0,0,0.48); }
    .unit-card.st-available { border-top: 3px solid var(--success); }
    .unit-card.st-reserved  { border-top: 3px solid var(--warning); }
    .unit-card.is-sold { opacity: 0.55; cursor: default; border-top: 3px solid #6b7a8d; }

    .uc-header { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(var(--fg-rgb), 0.05); }
    .uc-project { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); opacity: 0.85; }
    .uc-building { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-top: 3px; }
    .uc-badges { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

    .type-badge { display: inline-block; font-size: 0.66rem; padding: 2px 8px; border-radius: 20px; font-weight: 800; white-space: nowrap; }
    .type-badge.apt  { background: rgba(78,141,245,.14); color: rgba(120,170,255,.9); border: 1px solid rgba(78,141,245,.28); }
    .type-badge.roof { background: rgba(155,89,182,.18); color: #d7aef0; border: 1px solid rgba(155,89,182,.38); }

    .status-badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; border: 1.5px solid; white-space: nowrap; }
    .status-badge.available { background: rgba(52,199,89,0.14);  color: var(--success); border-color: rgba(52,199,89,0.5); }
    .status-badge.reserved  { background: rgba(255,204,0,0.11);  color: var(--warning); border-color: rgba(255,204,0,0.5); }
    .status-badge.sold      { background: rgba(107,122,141,0.15); color: #8fa3c0;       border-color: rgba(107,122,141,0.4); }

    .uc-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; }
    .uc-unit-num { font-size: 1.5rem; font-weight: 900; color: var(--light); margin-bottom: 3px; line-height: 1; }
    .uc-floor    { font-size: 0.76rem; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; }
    .uc-price    { font-size: 1.25rem; font-weight: 900; color: var(--light); margin-bottom: 12px; display: flex; align-items: baseline; gap: 4px; }
    .uc-price .currency { font-size: 0.76rem; color: var(--text-muted); font-weight: 600; }
    .uc-specs    { display: flex; gap: 14px; flex-wrap: wrap; }
    .uc-spec     { display: flex; align-items: center; gap: 4px; font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
    .uc-spec i   { font-size: 0.88rem; color: rgba(120,160,220,0.7); }

    .uc-footer { padding: 10px 16px; border-top: 1px solid rgba(var(--fg-rgb), 0.05); background: rgba(0,0,0,0.1); display: flex; justify-content: center; }
    .detail-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: inherit; font-weight: 700; font-size: 0.81rem;
      background: transparent; color: var(--accent);
      border: 1px solid rgba(78,141,245,0.28); border-radius: 7px;
      padding: 6px 18px; cursor: pointer; transition: var(--transition); width: 100%; justify-content: center;
    }
    .detail-btn:hover { background: rgba(78,141,245,0.1); border-color: var(--accent); }

    /* ════ PAGINATION ════════════════════════════════════════ */
    .pagination { display: flex; justify-content: center; gap: 7px; margin-top: 36px; flex-wrap: wrap; }
    .page-btn {
      background: rgba(var(--fg-rgb), 0.06); color: var(--light);
      border: 1px solid rgba(var(--fg-rgb), 0.1); padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font-family: inherit; font-weight: 700; font-size: 0.83rem;
      transition: var(--transition); min-width: 38px; text-align: center;
    }
    .page-btn:hover:not(:disabled) { background: rgba(var(--fg-rgb), 0.12); transform: translateY(-1px); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 4px 12px rgba(78,141,245,0.4); }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ════ MISC ══════════════════════════════════════════════ */
    .loader-container { display: flex; justify-content: center; align-items: center; padding: 80px 20px; flex-direction: column; gap: 14px; }
    .spinner { width: 42px; height: 42px; border: 3px solid rgba(var(--fg-rgb), 0.08); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
    .loader-text { color: var(--text-muted); font-size: 0.88rem; font-weight: 600; }

    .empty-state { text-align: center; padding: 60px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .empty-icon  { font-size: 2.8rem; opacity: 0.22; }
    .empty-title { font-size: 1.05rem; font-weight: 800; color: rgba(var(--fg-rgb), 0.45); }
    .empty-sub   { font-size: 0.85rem; color: var(--text-muted); }

    /* ════ MODAL ═════════════════════════════════════════════ */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(6px); }
    .modal.active { display: flex; animation: fadeIn 0.25s ease; }

      background: linear-gradient(145deg, var(--primary) 0%, var(--card-bg) 100%);
      border-radius: 20px; border: 1px solid rgba(var(--fg-rgb), 0.13);
      width: 90%; max-width: 500px; max-height: 88vh; overflow-y: auto;

      position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
    }
    .modal-close {
      position: absolute; top: 14px; left: 14px; font-size: 1.5rem; color: var(--light); cursor: pointer; opacity: 0.55;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: rgba(var(--fg-rgb), 0.05); transition: var(--transition);

    .modal-header { padding: 28px 28px 16px; border-bottom: 1px solid rgba(var(--fg-rgb), 0.07); background: rgba(0,0,0,0.14); border-radius: 20px 20px 0 0; }

    .modal-status-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-body { padding: 24px 28px; }
    .modal-section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 800; margin: 18px 0 9px; }
    .modal-section-title:first-child { margin-top: 0; }
    .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid rgba(var(--fg-rgb), 0.04); opacity: 0; animation: fadeUp 0.32s cubic-bezier(0.4,0,0.2,1) forwards; }
    .detail-item:last-child { border-bottom: none; }

    .facing-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 11px; border-radius: 20px; font-size: 0.76rem; font-weight: 700; background: rgba(78,141,245,0.1); color: rgba(140,185,255,0.9); border: 1px solid rgba(78,141,245,0.24); }

    /* ════ RESPONSIVE ════════════════════════════════════════ */

      .price-range { gap: 6px; }
      .price-input { width: 80px; }
    }
    @media (max-width: 600px) {

      .grid, .units-grid { grid-template-columns: 1fr; gap: 12px; }
      .stats-bar { padding: 12px 12px; gap: 10px; }
      .stat-chip { padding: 13px 14px; gap: 11px; }

      /* أهداف لمس أكبر */

      .filter-row > .clear-btn { flex: 1 1 100%; width: 100%; justify-content: center; }
      .breadcrumb-wrap { padding: 0 12px 10px; }

      /* خريطة الأدوار: وحدتين في الصف */
      .units-list { gap: 7px; padding: 12px; }

      .filter-group { flex: 1 1 100%; }

    }

    /* ════════════════════ PREMIUM REVAMP ════════════════════ */
    html { background: var(--primary-deep, #081830); scroll-behavior: smooth; }

    ::selection { background: rgba(var(--accent-rgb, 78,141,245), .3); }

    /* خلفية حية (شبكة خفيفة فقط) */

      position: fixed; inset: 0; z-index: -1; pointer-events: none;

      -webkit-mask: radial-gradient(ellipse 75% 55% at 50% 0%, #000, transparent 78%);

    header { background: rgba(var(--bg-rgb), .55); box-shadow: 0 6px 26px rgba(0,0,0,.20); }
    .logo-dot { animation: dotPulse 2.4s ease-in-out infinite; }
    @keyframes dotPulse {

    }

    /* إحصائيات بحواف ملوّنة + دخول متدرّج */
    .stat-chip {
      position: relative; overflow: hidden;
      background: linear-gradient(160deg, rgba(var(--fg-rgb), .07), rgba(var(--fg-rgb), .02));
      border: 1px solid rgba(var(--fg-rgb), .10);

    }

    .stat-chip:nth-child(3){animation-delay:.18s} .stat-chip:nth-child(4){animation-delay:.25s}
    .stat-chip::before { content:''; position:absolute; inset:0 0 auto 0; height:3px; }
    .stats-bar .stat-chip:nth-child(1)::before { background: var(--accent); }
    .stats-bar .stat-chip:nth-child(2)::before { background: var(--success); }
    .stats-bar .stat-chip:nth-child(3)::before { background: var(--warning); }
    .stats-bar .stat-chip:nth-child(4)::before { background: var(--danger); }
    .stat-chip:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.42); border-color: rgba(var(--fg-rgb), .18); }
    .stat-chip-icon { box-shadow: 0 6px 16px rgba(0,0,0,.22); }

    /* كارت الفلاتر */
    .filter-card {
      background: linear-gradient(160deg, rgba(var(--fg-rgb), .08), rgba(var(--fg-rgb), .03));
      border: 1px solid rgba(var(--fg-rgb), .10);
      box-shadow: 0 12px 40px rgba(0,0,0,.32);
      opacity: 0; animation: fadeUp .5s cubic-bezier(.4,0,.2,1) .1s forwards;
    }
    .filter-select:focus, .price-input:focus { box-shadow: 0 0 0 3px rgba(var(--accent-rgb, 78,141,245), .16); }
    .pill.active { box-shadow: 0 4px 14px rgba(0,0,0,.20); }

    /* كروت المشاريع/المباني — جلاس + حد بيلمع عند hover */
    .proj-card {
      position: relative; overflow: hidden;
      background: linear-gradient(165deg, var(--card-bg), rgba(var(--bg-rgb), .92));
      box-shadow: 0 12px 32px rgba(0,0,0,.3);
    }
    .proj-card::after {
      content:''; position:absolute; inset:0; border-radius:inherit; padding:1.5px; pointer-events:none;
      background: linear-gradient(150deg, rgba(var(--accent-rgb, 78,141,245), .6), transparent 45%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: 0; transition: opacity .3s;
    }
    .proj-card:hover::after { opacity: 1; }

    /* كروت نتائج الوحدات */
    .unit-card { background: linear-gradient(165deg, var(--card-bg), rgba(var(--bg-rgb), .92)); box-shadow: 0 10px 26px rgba(0,0,0,.28); }
    .unit-card:hover:not(.is-sold) { box-shadow: 0 20px 44px rgba(0,0,0,.5); }

    /* ════════ FILTERS — لاهيب ════════ */
    .filter-card { position: relative; }
    .filter-label { display: inline-flex; align-items: center; gap: 5px; }
    .filter-label::before {
      content:''; width:4px; height:4px; border-radius:50%;
      background: var(--accent); opacity:.65; flex-shrink:0;
    }
    .filter-sep { display: none; }

    /* القوائم */
    .filter-select:hover { border-color: rgba(var(--accent-rgb, 78,141,245), .4); background-color: rgba(var(--accent-rgb, 78,141,245), .06); }
    .filter-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(var(--accent-rgb, 78,141,245), .16); }

    /* البِلز */
    .pill { border: 1.5px solid rgba(var(--fg-rgb), .1); border-radius: 11px; }
    .pill:hover { transform: translateY(-1px); border-color: rgba(var(--fg-rgb), .28); }
    .pill.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark, #3a7ae0));
      color: #fff; border-color: transparent;
      box-shadow: 0 5px 16px rgba(var(--accent-rgb, 78,141,245), .38);
    }
    .pill.avail.active {
      background: linear-gradient(135deg, #34c759, #21a347);
      color: #fff; border-color: transparent;
      box-shadow: 0 5px 16px rgba(52,199,89,.38);
    }
    .pill.resrv.active {
      background: linear-gradient(135deg, #ffd43b, #f0a500);
      color: #2a1c00; border-color: transparent;
      box-shadow: 0 5px 16px rgba(255,204,0,.34);
    }

    /* حقول السعر */
    .price-input:hover { border-color: rgba(var(--accent-rgb, 78,141,245), .4); }
    .price-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(var(--accent-rgb, 78,141,245), .16); }

    /* زر المسح */
    .clear-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(255,59,48,.28); }

    @media (prefers-reduced-motion: reduce) {
      .bg-fx::before, .bg-fx::after, .logo-dot, .stat-chip, .filter-card { animation: none !important; }
      .stat-chip, .filter-card { opacity: 1 !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>

  /* Replace logo dot with actual logo when brand loads */
  document.addEventListener('brandLoaded', () => {
    if (window.BRAND?.logoUrl) {

      if (dot) {
        dot.outerHTML = `<img src="${window.BRAND.logoUrl}" alt="${window.BRAND.companyName||'logo'}" style="height:32px;max-width:120px;object-fit:contain;">`;

  const ST_AR     = { Available:'متاح', Reserved:'محجوز', Sold:'مباع' };
  const ST_BADGE  = { Available:'available', Reserved:'reserved', Sold:'sold' };
  const ST_CSS    = { Available:'st-available', Reserved:'st-reserved', Sold:'st-sold' };

  // ── Data store ───────────────────────────────────────────────
  let store = { projects:[], buildings:[], floors:[], units:[], enriched:[] };

  // ── Browse state (drill-down) ─────────────────────────────────
  let browse = { mode:'projects', projectId:null, projectName:'', buildingId:null, buildingName:'' };

  // ── Search/filter state ──────────────────────────────────────
  let filtered = [];
  let currentPage = 1;
  let _filterTimer = null;
  const filters = { location:'', status:'all', type:'all', priceMin:0, priceMax:0, rooms:0, facing:0, sort:'default', projectStatus:'all' };
  const ENG_RE = /<!--ENG:[\d,\s]*-->/g;
  function stripEngMarker(s) { return (s||'').replace(ENG_RE,'').trim(); }

  // ── Utilities ────────────────────────────────────────────────
  function arr(v)  { return Array.isArray(v) ? v : (v?.data || v?.items || []); }
  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
  function esc(s)  { return (s||'').replace(/'/g,"\\'"); }

  // تصحيح أسماء الأحياء الشائعة
  const LOCATION_FIXES = {
    'الصفا':       'الصفاء',
    'الصفا ':      'الصفاء',
    'العزيزيه':    'العزيزية',
    'الحمراء ':    'الحمراء',
    'الزهراء ':    'الزهراء',
    'الروضه':      'الروضة',
    'النزهه':      'النزهة',
    'الربوه':      'الربوة',
    'الشاطئ ':     'الشاطئ',
    'الكورنيش ':   'الكورنيش',
    'ام السلم':    'أم السلم',
    'ام حبلين':    'أم حبلين',
    'ابحر الشمالية': 'أبحر الشمالية',
    'ابحر الجنوبية': 'أبحر الجنوبية',
  };
  function normalizeLocation(loc) {
    if (!loc) return '';
    const trimmed = loc.trim();
    return LOCATION_FIXES[trimmed] || trimmed;
  }

  function toFacing(val) {
    if (!val || val === 0) return 0;
    if (typeof val === 'number') return val;
    const m = { frontonstreet:1,frontonestreet:1,FrontOneStreet:1,fronttwostreets:2,FrontTwoStreets:2,back:3,Back:3 };
    return m[val] ?? 0;
  }
  function isRoofUnit(u) { return u.type === 2 || String(u.type||'').toLowerCase() === 'roof'; }
  function isSold(u) { return (u.status||'').toLowerCase() === 'sold'; }

  async function apiFetch(ep) {
    const token = localStorage.getItem('token') || '';
    try {
      const r = await fetch(`${API_BASE}${ep}`, { headers: token ? { Authorization:`Bearer ${token}` } : {} });
      if (!r.ok) throw new Error(r.status);
      return await r.json();
    } catch(e) { console.error(ep, e); return null; }
  }

  // ── Load all data ─────────────────────────────────────────────
  async function loadAllData() {
    showLoader();
    const [pd, bd, fd, ud] = await Promise.all([
      apiFetch('/api/Projects'), apiFetch('/api/Buildings'),
      apiFetch('/api/Floors'),   apiFetch('/api/Units'),
    ]);
    store.projects  = arr(pd);
    store.buildings = arr(bd);
    store.floors    = arr(fd);
    store.units     = arr(ud);

    const pm = {}, bm = {}, fm = {};
    store.projects.forEach(p  => pm[p.id] = p);
    store.buildings.forEach(b => bm[b.id] = b);
    store.floors.forEach(f    => fm[f.id] = f);

    store.enriched = store.units
      .filter(u => (u.status||'').toLowerCase() !== 'closed')
      .map(u => {
        const f = fm[u.floorId]        || {};
        const b = bm[f.buildingId]     || {};
        const p = pm[b.projectId]      || {};
        return { ...u,
          _floor: f, _floorNumber: f.floorNumber ?? null,
          _buildingId: b.id, _buildingName: b.name || '—',
          _projectId:  p.id, _projectName:  p.name || '—', _projStatus: p.status,
          _location: normalizeLocation(p.location || ''),
          _facing:  toFacing(u.facing),
          _isRoof:  isRoofUnit(u),
          _isSold:  isSold(u),
          _price:   Number(u.price) || 0,
          _area:    Number(u.area)  || 0,
          _rooms:   Number(u.rooms) || 0,
          _stLow:   (u.status||'').toLowerCase(),
        };
      });

    buildLocationOptions();
    buildRoomsOptions();
    updateStats(store.enriched);
    renderView();
  }

  function buildLocationOptions() {
    const locs = [...new Set(store.enriched.map(u => u._location).filter(Boolean))].sort();
    const sel = document.getElementById('locationSelect');
    locs.forEach(l => { const o = document.createElement('option'); o.value=l; o.textContent=l; sel.appendChild(o); });
  }

  function buildRoomsOptions() {
    const rooms = [...new Set(store.enriched.map(u => u._rooms).filter(r => r > 0))].sort((a,b)=>a-b);
    const sel = document.getElementById('roomsSelect');
    sel.innerHTML = '<option value="0">الكل</option>';
    rooms.forEach(r => { const o = document.createElement('option'); o.value=r; o.textContent=r+' غرف'; sel.appendChild(o); });
  }

  function countUp(el, target) {
    if (!el) return;
    const dur = 900, start = performance.now();
    function tick(now) {
      const p = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * eased);
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function updateStats(units) {
    countUp(document.getElementById('statTotal'), units.length);
    countUp(document.getElementById('statAvail'), units.filter(u=>u._stLow==='available').length);
    countUp(document.getElementById('statResrv'), units.filter(u=>u._stLow==='reserved').length);
    countUp(document.getElementById('statSold'),  units.filter(u=>u._stLow==='sold').length);
  }

  // ── Determine mode ───────────────────────────────────────────
  function isSearchMode() {
    return !!(filters.location ||
              filters.status !== 'all' || filters.type !== 'all' ||
              filters.rooms || filters.facing || filters.priceMin || filters.priceMax);
  }

  // ── Master render ─────────────────────────────────────────────
  function renderView() {
    const searchMode = isSearchMode();
    document.getElementById('resultsHeader').style.display = searchMode ? 'flex' : 'none';

    if (searchMode) {
      renderSearch();
    } else {
      renderBrowse();
    }
  }

  // ══════════════════════════════════════════════════════════════
  //  BROWSE MODE
  // ══════════════════════════════════════════════════════════════
  function renderBrowse() {
    if (browse.mode === 'projects')  renderProjects();
    else if (browse.mode === 'buildings') renderBuildings();
    else if (browse.mode === 'units')     renderFloorMap();
  }

  function updateBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    if (browse.mode === 'projects') {
      bc.innerHTML = `<span class="bc-current">المشاريع</span>`;
    } else if (browse.mode === 'buildings') {
      bc.innerHTML =
        `<span class="bc-item" onclick="goHome()">المشاريع</span>
         <span class="bc-sep">/</span>
         <span class="bc-current">${browse.projectName}</span>`;
    } else if (browse.mode === 'units') {
      bc.innerHTML =
        `<span class="bc-item" onclick="goHome()">المشاريع</span>
         <span class="bc-sep">/</span>
         <span class="bc-item" onclick="showBuildings(${browse.projectId},'${esc(browse.projectName)}')">${browse.projectName}</span>
         <span class="bc-sep">/</span>
         <span class="bc-current">${browse.buildingName}</span>`;
    }
  }

  function projStatusMatch(p) {
    if (filters.projectStatus === 'all') return true;
    const s = p.status;
    const isUnder = s === 1 || s === 'UnderConstruction' || s === 'underConstruction';
    if (filters.projectStatus === 'under') return isUnder;
    if (filters.projectStatus === 'done')  return !isUnder;
    return true;
  }

  function renderProjects() {
    updateBreadcrumb();
    const v = document.getElementById('mainView');
    let items = store.projects.filter(projStatusMatch);

    if (!items.length) {
      const isFiltering = filters.projectStatus !== 'all';
      v.innerHTML = isFiltering
        ? emptyHtml('لا توجد مشاريع مطابقة', 'جرّب تعديل فلتر حالة المشروع')
        : emptyHtml('لا يوجد مشاريع حالياً', 'سيتم عرض المشاريع هنا فور إضافتها');
      document.getElementById('pagination').innerHTML='';
      return;
    }

    let h = '<div class="grid">';
    items.forEach((p, i) => {
      const u = store.enriched.filter(u => u._projectId === p.id);
      const avail = u.filter(x=>x._stLow==='available').length;
      const resrv = u.filter(x=>x._stLow==='reserved').length;
      const sold  = u.filter(x=>x._stLow==='sold').length;
      const total = u.length;
      const rawDesc = stripEngMarker(p.description || '');
      const desc  = rawDesc ? (rawDesc.length>90 ? rawDesc.slice(0,90)+'…' : rawDesc) : 'مشروع عقاري متميز في موقع استراتيجي';
      const isUnder = p.status === 1 || p.status === 'UnderConstruction' || p.status === 'underConstruction';
      const statusBadge = `<span style="display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;${isUnder?'background:rgba(255,204,0,.12);color:#ffcc00;border:1px solid rgba(255,204,0,.3)':'background:rgba(52,199,89,.12);color:#34c759;border:1px solid rgba(52,199,89,.3)'}">${isUnder?'تحت الإنشاء':'جاهز'}</span>`;

      h += `<div class="proj-card" style="animation-delay:${i*50}ms" onclick="showBuildings(${p.id},'${esc(p.name)}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
          <h3 style="margin:0">${p.name}</h3>
          ${statusBadge}
        </div>
        <div class="meta"><i class="ri-map-pin-line"></i> ${p.location||'—'}</div>
        <p class="desc">${desc}</p>
        <div class="proj-stats">
          <div class="ps-box ps-total"><div class="ps-num">${total}</div><div class="ps-lbl">وحدات</div></div>
          <div class="ps-box ps-avail"><div class="ps-num">${avail}</div><div class="ps-lbl">متاح</div></div>
          <div class="ps-box ps-resrv"><div class="ps-num">${resrv}</div><div class="ps-lbl">محجوز</div></div>
          <div class="ps-box ps-sold"><div class="ps-num">${sold}</div><div class="ps-lbl">مباع</div></div>
        </div>
      </div>`;
    });
    h += '</div>';
    v.innerHTML = h;
    document.getElementById('pagination').innerHTML = '';
  }

  function renderBuildings() {
    updateBreadcrumb();
    const v = document.getElementById('mainView');
    let items = store.buildings.filter(b => Number(b.projectId) === Number(browse.projectId));

    if (!items.length) { v.innerHTML=emptyHtml('لا توجد مبانٍ في هذا المشروع'); document.getElementById('pagination').innerHTML=''; return; }

    let h = '<div class="grid">';
    items.forEach((b, i) => {
      const u = store.enriched.filter(u => u._buildingId === b.id);
      const avail = u.filter(x=>x._stLow==='available').length;
      const resrv = u.filter(x=>x._stLow==='reserved').length;
      const sold  = u.filter(x=>x._stLow==='sold').length;
      const total = u.length;

      h += `<div class="proj-card" style="animation-delay:${i*50}ms" onclick="showFloorMap(${b.id},'${esc(b.name)}')">
        <h3>${b.name}</h3>
        <div class="meta"><i class="ri-building-2-line"></i> ${browse.projectName}</div>
        <div class="proj-stats">
          <div class="ps-box ps-total"><div class="ps-num">${total}</div><div class="ps-lbl">وحدات</div></div>
          <div class="ps-box ps-avail"><div class="ps-num">${avail}</div><div class="ps-lbl">متاح</div></div>
          <div class="ps-box ps-resrv"><div class="ps-num">${resrv}</div><div class="ps-lbl">محجوز</div></div>
          <div class="ps-box ps-sold"><div class="ps-num">${sold}</div><div class="ps-lbl">مباع</div></div>
        </div>
      </div>`;
    });
    h += '</div>';
    v.innerHTML = h;
    document.getElementById('pagination').innerHTML = '';
  }

  function renderFloorMap() {
    updateBreadcrumb();
    const v = document.getElementById('mainView');
    const floors = store.floors
      .filter(f => Number(f.buildingId) === Number(browse.buildingId))
      .sort((a,b) => (a.floorNumber??0) - (b.floorNumber??0));
    const units = store.enriched.filter(u => u._buildingId === browse.buildingId);

    if (!floors.length) { v.innerHTML=emptyHtml('لا توجد أدوار مسجّلة'); document.getElementById('pagination').innerHTML=''; return; }

    let h = '<div class="building-map">';
    let idx = 0;
    floors.forEach((f, fi) => {
      const fu = units.filter(u => Number(u.floorId) === Number(f.id));
      if (!fu.length) return;
      idx++;
      const floorName = f.floorNumber != null ? `الدور ${f.floorNumber}` : (f.name || `طابق ${fi+1}`);
      const avail = fu.filter(u=>u._stLow==='available').length;
      const resrv = fu.filter(u=>u._stLow==='reserved').length;
      const sold  = fu.filter(u=>u._stLow==='sold').length;

      h += `<div class="floor-row" style="animation-delay:${idx*55}ms">
        <div class="floor-header">
          <div class="floor-label">${floorName}</div>
          <span class="floor-count">${fu.length} وحدة</span>
        </div>
        <div class="units-list">`;

      fu.forEach(u => {
        if (u._isSold) {
          h += `<div class="unit-box st-sold">
            <div class="unit-box-top" style="align-items:center;justify-content:center;min-height:52px">
              <span class="u-num" style="opacity:.45;font-size:.85rem">${u.unitNumber}</span>
            </div>
            <div class="unit-box-bottom">
              <span class="u-status-dot"></span>
              <span class="u-status-text">مباع</span>
            </div>
          </div>`;
          return;
        }
        const css      = ST_CSS[u.status] || 'st-available';
        const stAr     = ST_AR[u.status]  || '—';
        const price    = u._price > 0 ? window.fmtMoney(u._price) : '—';
        const typeBadge = u._isRoof
          ? '<span class="u-type-badge u-type-roof">روف</span>'
          : '<span class="u-type-badge u-type-apt">شقة</span>';

        h += `<div class="unit-box ${css}" onclick='openModal(${JSON.stringify(u)})'>
          <div class="unit-box-top">
            <div class="u-num-row">
              <span class="u-num">${u.unitNumber}</span>${typeBadge}
            </div>
            <div class="u-divider"></div>
            ${u._rooms>0 ? `<div class="u-info-row">🛏 ${u._rooms} غرف</div>` : ''}
            ${u._area >0 ? `<div class="u-info-row">📐 ${u._area} م²</div>` : ''}
          </div>
          <div class="unit-box-bottom">
            <span class="u-status-dot"></span>
            <span class="u-status-text">${stAr}</span>
            ${u._stLow === 'available' ? `<span class="u-price-text">${price}</span>` : ''}
          </div>
        </div>`;
      });

      h += `</div>`;
      if (avail + resrv + sold > 0) {
        h += `<div class="floor-legend">
          ${avail>0?`<span class="legend-item"><span class="legend-dot" style="background:var(--success)"></span>متاح (${avail})</span>`:''}
          ${resrv>0?`<span class="legend-item"><span class="legend-dot" style="background:var(--warning)"></span>محجوز (${resrv})</span>`:''}
          ${sold >0?`<span class="legend-item"><span class="legend-dot" style="background:var(--danger)"></span>مباع (${sold})</span>`:''}
        </div>`;
      }
      h += `</div>`;
    });
    if (!idx) { v.innerHTML=emptyHtml('لا توجد وحدات'); document.getElementById('pagination').innerHTML=''; return; }
    h += '</div>';
    v.innerHTML = h;
    document.getElementById('pagination').innerHTML = '';
  }

  // ── Browse navigation ─────────────────────────────────────────
  function goHome() {
    browse.mode = 'projects';
    clearFiltersState();
    updateBreadcrumb();
    renderProjects();
  }

  function showBuildings(projectId, projectName) {
    browse.mode = 'buildings'; browse.projectId = projectId; browse.projectName = projectName;
    renderBrowse();
  }

  function showFloorMap(buildingId, buildingName) {
    browse.mode = 'units'; browse.buildingId = buildingId; browse.buildingName = buildingName;
    renderBrowse();
  }

  // ══════════════════════════════════════════════════════════════
  //  SEARCH MODE
  // ══════════════════════════════════════════════════════════════
  function renderSearch() {
    // Update breadcrumb for search mode
    document.getElementById('breadcrumb').innerHTML =
      `<span class="bc-item" onclick="goHome()">المشاريع</span>
       <span class="bc-sep">/</span>
       <span class="bc-current">نتائج البحث</span>`;

    const total = filtered.length;
    const pages = Math.ceil(total / ITEMS_PER_PAGE);
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const page  = filtered.slice(start, start + ITEMS_PER_PAGE);

    document.getElementById('resultsCount').innerHTML = total > 0
      ? `عرض <strong>${page.length}</strong> من <strong>${total}</strong> وحدة`
      : `<strong>لا توجد وحدات مطابقة</strong>`;

    const v = document.getElementById('mainView');
    if (!page.length) {
      v.innerHTML = emptyHtml('لا توجد وحدات مطابقة للبحث', 'جرّب تغيير معايير البحث أو مسح الفلاتر');
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    let h = '<div class="units-grid">';
    page.forEach((u, i) => {
      const css     = ST_CSS[u.status]   || 'st-available';
      const bc      = ST_BADGE[u.status] || 'available';
      const stAr    = ST_AR[u.status]    || u.status;
      const typeCls = u._isRoof ? 'roof' : 'apt';
      const typeAr  = u._isRoof ? 'روف' : 'شقة';
      const price   = u._price > 0 ? Number(u._price).toLocaleString(window.CURLOCALE()) : null;
      const facingAr = FACING_AR[u._facing] || '—';
      const floorLabel = u._floorNumber != null ? ` — الدور ${u._floorNumber}` : '';
      const soldClass = u._isSold ? ' is-sold' : '';
      const clickAttr = u._isSold ? '' : `onclick='openModal(${JSON.stringify(u)})'`;

      h += `<div class="unit-card ${css}${soldClass}" style="animation-delay:${i*38}ms" ${clickAttr}>
        <div class="uc-header">
          <div>
            <div class="uc-project">${u._projectName}</div>
            <div class="uc-building"><i class="ri-building-2-line" style="font-size:.73rem"></i> ${u._buildingName}${floorLabel}</div>
          </div>
          <div class="uc-badges">
            <span class="type-badge ${typeCls}">${typeAr}</span>
            <span class="status-badge ${bc}">${stAr}</span>
          </div>
        </div>
        <div class="uc-body">
          <div class="uc-unit-num">وحدة ${u.unitNumber}</div>
          ${u._location ? `<div class="uc-floor"><i class="ri-map-pin-line" style="font-size:.76rem"></i> ${u._location}</div>` : '<div class="uc-floor">&nbsp;</div>'}
          ${u._stLow === 'available' && price
            ? `<div class="uc-price">${price} <span class="currency">${window.CUR()}</span></div>`
            : `<div class="uc-price" style="font-size:.9rem;color:var(--text-muted);font-style:italic;margin-bottom:14px">—</div>`
          }
          <div class="uc-specs">
            ${u._area  > 0 ? `<div class="uc-spec"><i class="ri-aspect-ratio-line"></i> ${u._area} م²</div>` : ''}
            ${u._rooms > 0 ? `<div class="uc-spec"><i class="ri-hotel-bed-line"></i> ${u._rooms} غرف</div>` : ''}
            ${u._facing> 0 ? `<div class="uc-spec"><i class="ri-compass-3-line"></i> ${facingAr}</div>` : ''}
          </div>
        </div>
        ${!u._isSold ? `<div class="uc-footer"><button class="detail-btn" onclick='event.stopPropagation();openModal(${JSON.stringify(u)})'><i class="ri-eye-line"></i> عرض التفاصيل</button></div>` : ''}
      </div>`;
    });
    h += '</div>';
    v.innerHTML = h;
    renderPagination(total, pages);
  }

  // ── Filter logic ─────────────────────────────────────────────
  function debouncedFilter() { clearTimeout(_filterTimer); _filterTimer = setTimeout(applyFilters, 200); }

  function readFilters() {
    filters.location = document.getElementById('locationSelect').value;
    filters.rooms    = Number(document.getElementById('roomsSelect').value);
    filters.facing   = Number(document.getElementById('facingSelect').value);
    filters.sort     = document.getElementById('sortSelect').value;
    const mn = document.getElementById('priceMin').value;
    const mx = document.getElementById('priceMax').value;
    filters.priceMin = mn ? Number(mn) : 0;
    filters.priceMax = mx ? Number(mx) : 0;
  }

  function applyFilters() {
    readFilters();

    // لو الحد الأدنى للسعر أكبر من الأقصى، صحّحهم تلقائيًا بدل ما يرجّع صفر نتائج
    if (filters.priceMin > 0 && filters.priceMax > 0 && filters.priceMin > filters.priceMax) {
      [filters.priceMin, filters.priceMax] = [filters.priceMax, filters.priceMin];
    }

    if (!isSearchMode()) {
      updateClearBtn();
      renderBrowse();
      return;
    }

    filtered = store.enriched.filter(u => {
      if (u._isSold) return false;
      if (filters.projectStatus !== 'all') {
        const isUnder = u._projStatus === 1 || u._projStatus === 'UnderConstruction' || u._projStatus === 'underConstruction';
        if (filters.projectStatus === 'under' ? !isUnder : isUnder) return false;
      }
      if (filters.status !== 'all' && u._stLow !== filters.status) return false;
      if (filters.type === 'apt'  &&  u._isRoof) return false;
      if (filters.type === 'roof' && !u._isRoof) return false;
      if (filters.location && u._location !== filters.location) return false;
      if (filters.rooms  > 0 && u._rooms  !== filters.rooms)  return false;
      if (filters.facing > 0 && u._facing !== filters.facing) return false;
      if (filters.priceMin > 0 && u._price < filters.priceMin) return false;
      if (filters.priceMax > 0 && u._price > filters.priceMax) return false;
      return true;
    });

    if (filters.sort === 'price_asc')  filtered.sort((a,b)=>a._price-b._price);
    if (filters.sort === 'price_desc') filtered.sort((a,b)=>b._price-a._price);
    if (filters.sort === 'area_asc')   filtered.sort((a,b)=>a._area-b._area);
    if (filters.sort === 'area_desc')  filtered.sort((a,b)=>b._area-a._area);
    if (filters.sort === 'rooms_asc')  filtered.sort((a,b)=>a._rooms-b._rooms);

    currentPage = 1;
    updateClearBtn();
    renderSearch();
  }

  function updateClearBtn() {
    document.getElementById('clearBtn').style.display = isSearchMode() ? 'inline-flex' : 'none';
  }

  function setPill(dim, val, btn) {
    filters[dim] = val;
    btn.closest('.pill-group').querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function clearFiltersState() {
    document.getElementById('locationSelect').value = '';
    document.getElementById('roomsSelect').value = '0';
    document.getElementById('facingSelect').value = '0';
    document.getElementById('priceMin').value = '';
    document.getElementById('priceMax').value = '';
    document.getElementById('sortSelect').value = 'default';
    ['statusPills','typePills'].forEach(id => {
      const g = document.getElementById(id);
      g.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.dataset.val==='all'));
    });
    Object.assign(filters, { location:'', status:'all', type:'all', priceMin:0, priceMax:0, rooms:0, facing:0, sort:'default', projectStatus:'all' });
    const pg = document.getElementById('projStatusPills');
    if (pg) pg.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.dataset.val==='all'));
    document.getElementById('clearBtn').style.display = 'none';
    document.getElementById('resultsHeader').style.display = 'none';
  }

  function clearFilters() {
    clearFiltersState();
    browse.mode = 'projects';
    renderProjects();
  }

  // ── Pagination ───────────────────────────────────────────────
  function renderPagination(total, pages) {
    const div = document.getElementById('pagination');
    if (pages <= 1) { div.innerHTML=''; return; }
    let h = `<button class="page-btn" onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}><i class="ri-arrow-right-s-line"></i></button>`;
    const range=[];
    for (let i=1;i<=pages;i++) {
      if (i===1||i===pages||(i>=currentPage-2&&i<=currentPage+2)) range.push(i);
      else if (range[range.length-1]!=='…') range.push('…');
    }
    range.forEach(p => {
      h += p==='…'
        ? `<span class="page-btn" style="cursor:default;opacity:.35">…</span>`
        : `<button class="page-btn ${currentPage===p?'active':''}" onclick="goToPage(${p})">${p}</button>`;
    });
    h += `<button class="page-btn" onclick="goToPage(${currentPage+1})" ${currentPage===pages?'disabled':''}><i class="ri-arrow-left-s-line"></i></button>`;
    div.innerHTML = h;
  }

  function goToPage(page) {
    currentPage = page;
    renderSearch();
    window.scrollTo({ top: document.querySelector('.filter-section').offsetTop - 80, behavior:'smooth' });
  }

  // ── Modal ────────────────────────────────────────────────────
  function openModal(unit) {
    if (unit._isSold) return;
    document.getElementById('modalTitle').textContent = `وحدة رقم ${unit.unitNumber}`;
    const bc   = ST_BADGE[unit.status] || 'available';
    const stAr = ST_AR[unit.status]   || unit.status;
    const facing = unit._facing ?? toFacing(unit.facing);

    document.getElementById('modalStatusRow').innerHTML =
      `<span class="status-badge ${bc}" style="padding:5px 14px;font-size:.82rem">${stAr}</span>
       <span class="type-badge ${unit._isRoof?'roof':'apt'}" style="padding:5px 12px;font-size:.78rem">${unit._isRoof?'روف':'شقة'}</span>
       ${facing>0?`<span class="facing-badge"><i class="ri-compass-3-line"></i> ${FACING_AR[facing]}</span>`:''}`;

    const price = (unit._stLow === 'available' && unit._price > 0) ? window.fmtMoney(unit._price) : null;
    const rows = [
      { label:'المشروع',      value: unit._projectName  || '—' },
      { label:'المبنى',       value: unit._buildingName || '—' },
      unit._floorNumber!=null ? { label:'الدور',         value:`الدور ${unit._floorNumber}` } : null,
      unit._location         ? { label:'الموقع / الحي',  value: unit._location } : null,
      { sep: true },
      price ? { label:'السعر', value: price } : null,
      unit._area  > 0 ? { label:'المساحة',    value:`${unit._area} م²`     } : null,
      unit._rooms > 0 ? { label:'عدد الغرف',  value:`${unit._rooms} غرفة`  } : null,
      facing > 0  ? { label:'الواجهة',     value: FACING_AR[facing] } : null,
      unit.description ? { label:'ملاحظات', value: unit.description } : null,
    ].filter(Boolean);

    let delay = 0;
    document.getElementById('modalBody').innerHTML = rows.map(r => {
      if (r.sep) return `<div class="modal-section-title">تفاصيل الوحدة</div>`;
      delay += 50;
      return `<div class="detail-item" style="animation-delay:${delay}ms">
                <span class="detail-label">${r.label}</span>
                <span class="detail-value">${r.value}</span>
              </div>`;
    }).join('');

    const modal = document.getElementById('unitModal');
    modal.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => modal.classList.add('active')));
  }

  function closeModal() {
    const modal = document.getElementById('unitModal');
    modal.classList.remove('active');
    setTimeout(() => modal.style.display = 'none', 280);
  }

  window.addEventListener('click', e => { if (e.target===document.getElementById('unitModal')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  // ── Helpers ──────────────────────────────────────────────────
  function showLoader() {
    document.getElementById('mainView').innerHTML =
      `<div class="loader-container"><div class="spinner"></div><div class="loader-text">جاري تحميل البيانات...</div></div>`;
    document.getElementById('pagination').innerHTML = '';
  }

  function emptyHtml(title, sub='') {
    return `<div class="empty-state">
      <div class="empty-icon"><i class="ri-building-line"></i></div>
      <div class="empty-title">${title}</div>
      ${sub?`<div class="empty-sub">${sub}</div>`:''}
    </div>`;
  }

  // ── Boot ─────────────────────────────────────────────────────
  loadAllData();
</script>
</body>
</html>
