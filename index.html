<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أساس — النسخة التجريبية</title>
  <style>
    body{margin:0;font-family:system-ui,"Segoe UI",sans-serif;background:#081830;color:#eaf0fb;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:24px}
    .spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.12);border-top-color:#4e8df5;border-radius:50%;animation:s .8s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
    a{color:#9cc1ff;font-weight:700}
  </style>
  <script>
    // Start the demo like the real system: setup (branding) → login → role.
    // السيتب يتعمل مرة واحدة بس؛ بعد كده الجذر يروح على الدخول مباشرة (تبديل الأدوار مايرجعش للسيتب).
    setTimeout(function () {
      var done = localStorage.getItem('asas_setup_done');
      location.replace(done ? 'login.html' : 'setup.html');
    }, 50);
  </script>
</head>
<body>
  <div class="spin"></div>
  <p>جارٍ فتح أساس… إن لم يتم التحويل <a href="setup.html">اضغط هنا</a></p>
</body>
</html>
