<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام مهندس الموقع</title>
  <!-- ══ DEMO MODE ══ -->
  <script>window.__DEMO_ROLE='SiteEngineer';</script>
  <script src="mock/seed.js?v=4"></script>
  <script src="mock/mock-api.js?v=4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:      #0D2142;
      --primary-deep: #081830;
      --card-bg:      #112952;
      --card-hover:   #163366;
      --border:       rgba(var(--fg-rgb), 0.08);
      --border-hover: rgba(var(--fg-rgb), 0.2);
      --light:        #FFFFFF;
      --text-muted:   #8fa3c0;
      --success:      #34c759;
      --warning:      #ffcc00;
      --danger:       #ff3b30;
      --accent:       #4e8df5;
      --engineer:     #00b4d8;
      --header-h:     64px;
      --transition:   all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html, body {
      font-family: 'Tajawal', sans-serif;
      background: var(--primary-deep);
      color: var(--light);
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--primary-deep); }
    ::-webkit-scrollbar-thumb { background: rgba(var(--fg-rgb), 0.15); border-radius: 6px; }

    /* ══ HEADER ══ */
    #app-header {
      position: fixed; top: 0; right: 0; left: 0;
      height: var(--header-h); z-index: 900;
      background: rgba(var(--bg-rgb),0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; gap: 16px;
    }
    .header-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .header-logo {
      font-size: 1.15rem; font-weight: 800; color: var(--light);
      letter-spacing: -0.3px; white-space: nowrap;
      cursor: pointer; transition: var(--transition); text-decoration: none;
    }
    .header-logo:hover { opacity: 0.75; }
    .header-divider { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }
    .header-page-label { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
    .header-page-title {
      font-size: .95rem; font-weight: 700; color: var(--light);
      line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-role-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.68rem; font-weight: 600;
      color: var(--engineer); background: rgba(0,180,216,0.1);
      border: 1px solid rgba(0,180,216,0.28);
      padding: 2px 8px; border-radius: 20px; width: fit-content;
    }
    .header-nav { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: center; }
    .nav-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 13px; border-radius: 10px;
      cursor: pointer; color: var(--text-muted);
      font-size: 0.84rem; font-weight: 600;
      border: 1px solid transparent;
      transition: var(--transition); white-space: nowrap;
      background: none; font-family: 'Tajawal', sans-serif; text-decoration: none;
    }
    .nav-tab i { font-size: 1rem; }
    .nav-tab:hover { color: var(--light); background: rgba(var(--fg-rgb), 0.06); border-color: var(--border); }
    .nav-tab.active { color: var(--light); background: rgba(var(--fg-rgb), 0.1); border-color: rgba(var(--fg-rgb), 0.2); }
    .header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--engineer), #0077b6);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color:var(--light);
      border: 2px solid rgba(var(--fg-rgb), 0.15); flex-shrink: 0;
    }
    .user-name { font-size: 0.88rem; font-weight: 700; color: var(--light); white-space: nowrap; }
    .logout-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px;
      background: rgba(255,59,48,0.1); color: var(--danger);
      border: 1px solid rgba(255,59,48,0.28);
      cursor: pointer; font-family: 'Tajawal', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      transition: var(--transition); white-space: nowrap;
    }
    .logout-btn:hover { background: rgba(255,59,48,0.22); }

    /* ══ MAIN ══ */
    #app-main {
      margin-top: var(--header-h);
      min-height: calc(100vh - var(--header-h));
      padding: 36px 36px 80px;
      max-width: 1400px;
      margin-left: auto; margin-right: auto;
      transition: opacity 0.12s ease;
    }

    /* ══ DASHBOARD ══ */
    .page-header { margin-bottom: 28px; animation: fadeUp 0.5s ease both; }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; color: var(--light); margin-bottom: 4px; }
    .page-header p  { color: var(--text-muted); font-size: 0.9rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; animation: fadeUp 0.5s ease forwards;
      transition: var(--transition); position: relative; overflow: hidden;
    }
    .stat-card::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(135deg,rgba(var(--fg-rgb), .03) 0%,transparent 60%);
      pointer-events:none;
    }
    .stat-card:hover { transform:translateY(-5px); border-color:var(--border-hover); box-shadow:0 20px 48px rgba(0,0,0,.45); background:var(--card-hover); }
    .stat-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .stat-icon { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .stat-number { font-size:2.2rem; font-weight:800; line-height:1; }
    .stat-label  { font-size:.78rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
    .stat-card.blue   .stat-icon   { background:rgba(78,141,245,.15);  color:var(--accent); }
    .stat-card.teal   .stat-icon   { background:rgba(0,180,216,.15);   color:var(--engineer); }
    .stat-card.green  .stat-icon   { background:rgba(52,199,89,.15);   color:var(--success); }
    .stat-card.yellow .stat-icon   { background:rgba(255,204,0,.15);   color:var(--warning); }
    .stat-card.orange .stat-icon   { background:rgba(255,149,0,.15);   color:#ff9500; }
    .stat-card.blue   .stat-number { color:var(--accent); }
    .stat-card.teal   .stat-number { color:var(--engineer); }
    .stat-card.green  .stat-number { color:var(--success); }
    .stat-card.yellow .stat-number { color:var(--warning); }
    .stat-card.orange .stat-number { color:#ff9500; }

    /* ══ PROJECT CARDS ══ */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }
    .proj-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 18px; padding: 22px;
      display: flex; flex-direction: column; gap: 16px;
      opacity: 0; animation: fadeUp 0.4s ease forwards;
      transition: var(--transition);
    }
    .proj-card:hover { border-color: var(--border-hover); background: var(--card-hover); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,.4); }
    .proj-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .proj-name { font-size: 1.05rem; font-weight: 800; color: var(--light); }
    .proj-district { font-size: .75rem; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
    .proj-status-badge { padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .proj-status-active { background: rgba(0,180,216,.12); color: var(--engineer); border: 1px solid rgba(0,180,216,.25); }

    .proj-pct-row { display: flex; justify-content: space-between; font-size: .8rem; font-weight: 600; margin-bottom: 7px; }
    .proj-pct-row span:first-child { color: var(--text-muted); }
    .proj-pct-val { color: var(--engineer); font-size: .9rem; font-weight: 800; }
    .proj-bar-bg { height: 8px; background: rgba(var(--fg-rgb), .06); border-radius: 20px; overflow: hidden; }
    .proj-bar-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--engineer), #0077b6); transition: width 1s ease; }

    .proj-stage-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: rgba(var(--fg-rgb), .03); border: 1px solid var(--border); border-radius: 10px; }
    .proj-stage-label { font-size: .72rem; color: var(--text-muted); font-weight: 600; }
    .proj-stage-name { font-size: .85rem; font-weight: 700; color: var(--light); margin-top: 2px; }

    .proj-meta-row { display: flex; gap: 14px; }
    .proj-meta-item { display: flex; align-items: center; gap: 5px; font-size: .78rem; color: var(--text-muted); font-weight: 600; }
    .proj-meta-item i { font-size: .85rem; }
    .proj-meta-item strong { color: var(--light); }

    .proj-action {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 16px; border-radius: 10px; text-decoration: none;
      background: rgba(0,180,216,.1); color: var(--engineer);
      border: 1px solid rgba(0,180,216,.22);
      font-size: .84rem; font-weight: 700;
      transition: var(--transition); cursor: pointer;
      margin-top: auto;
    }
    .proj-action:hover { background: rgba(0,180,216,.2); }

    .dash-summary { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
    .dash-summary-item { flex: 1; min-width: 120px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
    .dash-summary-num { font-size: 1.6rem; font-weight: 800; }
    .dash-summary-lbl { font-size: .72rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    /* Skeleton */
    .skel {
      background: linear-gradient(90deg,rgba(var(--fg-rgb), .04) 25%,rgba(var(--fg-rgb), .08) 50%,rgba(var(--fg-rgb), .04) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 16px;
    }

    @keyframes fadeUp  { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    @media (max-width: 1100px) { .nav-tab span { display:none; } .nav-tab { padding:8px 10px; } }
    @media (max-width: 768px) {
      #app-header { padding: 0 16px; gap: 10px; }
      .header-nav { display: none; }
      .logout-btn { display: none; }
      .user-name  { display: none; }
      #app-main { padding: 20px 16px 80px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .stat-number { font-size: 1.7rem; }
      .stat-card { padding: 16px; }
      .bottom-grid { grid-template-columns: 1fr; }
      .header-divider { display: none; }
    }
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .header-page-label { display: none; }
    }
    @media (min-width: 1600px) { #app-main { max-width: 1600px; margin-right: auto; margin-left: auto; } }
    @media (min-width: 2000px) { #app-main { max-width: 1900px; } }
  </style>

  <link rel="stylesheet" href="config/polish.css"/>
  <script src="config/scroll-lock.js" defer></script>
  <script src="config/themes.js"></script>
  <script src="config/brand.js"></script>
  <script src="config/realtime.js" defer></script>
  <script src="config/notification-bell.js" defer></script>
  <script src="config/send-notification.js" defer></script>

<body>

  <header id="app-header"></header>

  <main id="app-main">
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
      <div style="width:36px;height:36px;border:3px solid rgba(var(--fg-rgb), 0.08);border-top-color:var(--engineer);border-radius:50%;animation:spin 0.75s linear infinite"></div>
    </div>
  </main>

  <script src="layout.js?v=4"></script>
  <script src="router.js?v=4"></script>

  <script>
    const STAGE_DEFS = [
      { key: 'SitePreparation',  emoji: '⛏️', label: 'تجهيز الموقع والحفر' },
      { key: 'Foundation',       emoji: '🧱', label: 'الأساسات' },
      { key: 'Structure',        emoji: '🏗️', label: 'الهيكل الإنشائي' },
      { key: 'MasonryAndWalls',  emoji: '🏠', label: 'المباني والحوائط' },
      { key: 'InitialFinishing', emoji: '🔨', label: 'التشطيبات الأولية' },
      { key: 'FinalFinishing',   emoji: '🎨', label: 'التشطيبات النهائية' },
      { key: 'Handover',         emoji: '🔑', label: 'التسليم' },
    ];

    window.__dashboardHTML = `
      <div class="page-header">
        <h1>لوحة المعلومات</h1>
        <p>مشاريعك الجارية ونسب الإنجاز</p>
      </div>
      <div class="dash-summary" id="dash-summary">
        <div class="skel dash-summary-item" style="height:72px"></div>
        <div class="skel dash-summary-item" style="height:72px"></div>
        <div class="skel dash-summary-item" style="height:72px"></div>
      </div>
      <div class="proj-grid" id="dash-projects">
        <div class="skel" style="height:240px"></div>
        <div class="skel" style="height:240px"></div>
      </div>
    `;

    async function loadDashboard() {
      const API = window.location.origin;

      function getToken() {
        let t = localStorage.getItem('token') || localStorage.getItem('authToken');
        if (!t) { try { const d = JSON.parse(localStorage.getItem('authData') || '{}'); t = d.token || d.authToken; } catch {} }
        return t || '';
      }
      async function get(p) {
        const r = await fetch(API + p, { headers: { 'Authorization': 'Bearer ' + getToken() } });
        if (!r.ok) throw new Error(r.status);
        return r.json().catch(() => null);
      }
      function arr(v) { return Array.isArray(v) ? v : (v?.data || v?.items || v?.value || v?.results || []); }
      function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function isDone(s) { return s.isCompleted === true || s.status === 'Completed'; }

      const summaryEl   = document.getElementById('dash-summary');
      const projectsEl  = document.getElementById('dash-projects');

      try {
        const [pd, sd] = await Promise.all([
          get('/api/Projects').catch(() => null),
          get('/api/ConstructionStages').catch(() => null),
        ]);

        const allProjects = arr(pd);
        const allStages   = arr(sd);

        /* فلتر 1: مشاريع المهندس (description marker → JWT → project fields) */
        const myAssignedProjects = (typeof window.filterMyProjects === 'function')
          ? window.filterMyProjects(allProjects)
          : allProjects;

        /* فلتر 2: تحت الإنشاء فقط (استبعاد المكتملة) */
        const myProjects = myAssignedProjects.filter(p =>
          p.status !== 'Completed' && p.isCompleted !== true
        );

        if (!summaryEl || !projectsEl) return;

        if (myProjects.length === 0) {
          summaryEl.innerHTML = '';
          projectsEl.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:50px 20px">
              <div style="font-size:2.8rem;margin-bottom:14px;opacity:.3"><i class="ri-building-4-line"></i></div>
              <div style="font-size:1rem;font-weight:700;color:rgba(var(--fg-rgb), .45);margin-bottom:6px">لا توجد مشاريع تحت الإنشاء</div>
              <div style="font-size:.82rem;color:var(--text-muted)">يمكن للمسؤول تخصيص المشاريع من إدارة المستخدمين</div>
            </div>`;
          return;
        }

        /* ── حسابات الـ summary ── */
        const myProjIds = new Set(myProjects.map(p => String(p.id)));
        const myStages = allStages.filter(s => myProjIds.has(String(s.projectId)));
        const totalDone = myStages.filter(isDone).length;

        /* "مراحل جارية" = عدد المشاريع اللي مش كل مراحلها مكتملة.
           كل مشروع تحت الإنشاء فيه مرحلة حالية واحدة (حتى لو لسه ماتسجلتش في الـ DB). */
        let totalInProgress = 0;
        myProjects.forEach(proj => {
          const projStages = myStages.filter(s => String(s.projectId) === String(proj.id));
          const doneCount = projStages.filter(isDone).length;
          if (doneCount < STAGE_DEFS.length) totalInProgress++;
        });

        summaryEl.innerHTML = [
          { num: myProjects.length, lbl: 'مشاريعي',         color: 'var(--engineer)' },
          { num: totalDone,         lbl: 'مراحل مكتملة',    color: 'var(--success)'  },
          { num: totalInProgress,   lbl: 'مراحل جارية',     color: 'var(--warning)'  },
        ].map(c => `
          <div class="dash-summary-item">
            <div class="dash-summary-num" style="color:${c.color}">${c.num}</div>
            <div class="dash-summary-lbl">${c.lbl}</div>
          </div>`).join('');

        /* ── بطاقات المشاريع ── */
        projectsEl.innerHTML = myProjects.map((proj, idx) => {
          const projId = String(proj.id);
          const stages = allStages.filter(s => String(s.projectId) === projId);

          const doneCount = stages.filter(isDone).length;
          const pct = Math.round(proj.progress ?? (STAGE_DEFS.length > 0 ? doneCount / STAGE_DEFS.length * 100 : 0));

          /* الـ Admin بيحفظ stageName بالعربي والمهندس بيستخدم key إنجليزي.
             فبنبني set من القيم العربية والإنجليزية معاً. */
          const doneNames = new Set(stages.filter(isDone).map(s => (s.stageName || '').trim()));
          const currentDef = STAGE_DEFS.find(d => !doneNames.has(d.key) && !doneNames.has(d.label));
          const stageLabel = currentDef ? `${currentDef.emoji} ${currentDef.label}` : '🎉 مكتمل';

          const barColor = pct >= 80 ? 'var(--success)'
            : pct >= 50 ? 'var(--engineer)'
            : pct >= 25 ? 'var(--warning)'
            : 'var(--accent)';

          return `
            <div class="proj-card" style="animation-delay:${idx * 80}ms">
              <div class="proj-card-top">
                <div>
                  <div class="proj-name">🏗️ ${esc(proj.name || 'مشروع #' + proj.id)}</div>
                  ${proj.district ? `<div class="proj-district"><i class="ri-map-pin-line"></i> ${esc(proj.district)}</div>` : ''}
                </div>
                <span class="proj-status-badge proj-status-active">جارٍ</span>
              </div>

              <div>
                <div class="proj-pct-row">
                  <span>نسبة الإنجاز</span>
                  <span class="proj-pct-val">${pct}%</span>
                </div>
                <div class="proj-bar-bg">
                  <div class="proj-bar-fill" style="width:${pct}%;background:${barColor}"></div>
                </div>
              </div>

              <div class="proj-stage-row">
                <i class="ri-record-circle-line" style="color:var(--engineer);font-size:1rem;flex-shrink:0"></i>
                <div>
                  <div class="proj-stage-label">المرحلة الجارية</div>
                  <div class="proj-stage-name">${stageLabel}</div>
                </div>
              </div>

              <div class="proj-meta-row">
                <div class="proj-meta-item">
                  <i class="ri-checkbox-circle-line" style="color:var(--success)"></i>
                  <span><strong>${doneCount}</strong> من <strong>${STAGE_DEFS.length}</strong> مراحل مكتملة</span>
                </div>
              </div>

              <a class="proj-action" href="#" onclick="window.navigate?.('buildings');return false;">
                <i class="ri-building-4-line"></i> عرض مراحل البناء
              </a>
            </div>`;
        }).join('');

      } catch(e) {
        console.error('Dashboard error:', e);
        if (projectsEl) projectsEl.innerHTML = `<div style="color:var(--text-muted);padding:30px;text-align:center;grid-column:1/-1">تعذر تحميل البيانات</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const _orig = window.navigate;
      window.navigate = async function(pageId, pushState) {
        await _orig?.(pageId, pushState);
        if (pageId === 'dashboard') setTimeout(loadDashboard, 80);
      };
      window.__initRouter?.();
    });
  </script>

  <!-- ══ DEMO bar ══ -->
  <style>
    #demo-bar{position:fixed;bottom:14px;left:14px;z-index:99998;display:flex;gap:8px;align-items:center;font-family:'Tajawal',sans-serif}
