<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مدير الحجوزات</title>
  <!-- ══ DEMO MODE ══ -->
  <script>window.__DEMO_ROLE='BookingManager';</script>
  <script src="mock/seed.js?v=17"></script>
  <script src="mock/mock-api.js?v=17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:      #0D2142;
      --primary-deep: #081830;
      --card-bg:      #112952;
      --card-hover:   #163366;
      --border:       rgba(var(--fg-rgb), 0.08);
      --border-hover: rgba(var(--fg-rgb), 0.2);
      --light:        #FFFFFF;
      --text-muted:   #8fa3c0;
      --success:      #34c759;
      --warning:      #ffcc00;
      --danger:       #ff3b30;
      --accent:       #4e8df5;
      --header-h:     64px;
      --transition:   all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html, body {
      font-family: 'Tajawal', sans-serif;
      background: var(--primary-deep);
      color: var(--light);
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--primary-deep); }
    ::-webkit-scrollbar-thumb { background: rgba(var(--fg-rgb), 0.15); border-radius: 6px; }

    /* ══ HEADER ══ */
    #app-header {
      position: fixed; top: 0; right: 0; left: 0;
      height: var(--header-h); z-index: 900;
      background: rgba(var(--bg-rgb),0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; gap: 16px;
    }
    .header-right { display:flex; align-items:center; gap:16px; flex-shrink:0; }
    .header-logo {
      font-size: 1.15rem; font-weight: 800; color: var(--light);
      letter-spacing: -0.3px; white-space: nowrap;
      text-decoration: none; cursor: pointer; transition: var(--transition);
    }
    .header-logo:hover { opacity: 0.75; }
    .header-divider { width:1px; height:26px; background:var(--border); flex-shrink:0; }
    .header-role-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.72rem; font-weight: 700;
      color: var(--warning); background: rgba(255,204,0,0.1);
      border: 1px solid rgba(255,204,0,0.28);
      padding: 3px 10px; border-radius: 20px; white-space: nowrap;
    }
    .header-nav { display:flex; align-items:center; gap:4px; flex:1; justify-content:center; }
    .nav-tab {
      display:flex; align-items:center; gap:6px;
      padding:8px 14px; border-radius:10px; cursor:pointer;
      color:var(--text-muted); font-size:0.87rem; font-weight:600;
      border:1px solid transparent; transition:var(--transition);
      white-space:nowrap; background:none; font-family:'Tajawal',sans-serif;
    }
    .nav-tab i { font-size:1rem; }
    .nav-tab:hover  { color:var(--light); background:rgba(var(--fg-rgb), 0.06); border-color:var(--border); }
    .nav-tab.active { color:var(--light); background:rgba(var(--fg-rgb), 0.1);  border-color:rgba(var(--fg-rgb), 0.2); }
    .header-left { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .user-avatar {
      width:34px; height:34px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),#2563eb);
      display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; font-weight:800; color:var(--light);
      border:2px solid rgba(var(--fg-rgb), 0.15); flex-shrink:0;
    }
    .user-name { font-size:0.88rem; font-weight:700; color:var(--light); white-space:nowrap; }
    .logout-btn {
      display:flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:9px;
      background:rgba(255,59,48,0.1); color:var(--danger);
      border:1px solid rgba(255,59,48,0.28); cursor:pointer;
      font-family:'Tajawal',sans-serif; font-size:0.82rem; font-weight:700;
      transition:var(--transition);
    }
    .logout-btn:hover { background:rgba(255,59,48,0.22); }
    .hamburger {
      display:none; flex-direction:column; justify-content:center; align-items:center;
      gap:5px; width:38px; height:38px; border-radius:9px;
      background:rgba(var(--fg-rgb), 0.06); border:1px solid var(--border);
      cursor:pointer; flex-shrink:0; transition:var(--transition);
    }
    .hamburger span { display:block; width:18px; height:2px; background:var(--light); border-radius:2px; transition:var(--transition); transform-origin:center; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; transform:scaleX(0); }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

    /* ══ DRAWER ══ */
    #drawer-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.62); z-index:1000;
      backdrop-filter:blur(4px); opacity:0; transition:opacity 0.28s ease;
    }
    #drawer-overlay.open { display:block; opacity:1; }
    #mobile-drawer {
      position:fixed; top:0; right:0; bottom:0;
      width:270px; max-width:85vw; z-index:1001;
      background:rgba(var(--bg-rgb),0.99); border-left:1px solid var(--border);
      display:flex; flex-direction:column;
      transform:translateX(110%);
      transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter:blur(20px); overflow-y:auto;
    }
    #mobile-drawer.open { transform:translateX(0); }
    .drawer-header {
      padding:18px 18px 14px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .drawer-logo { font-size:1.05rem; font-weight:800; color:var(--light); }
    .drawer-close {
      width:30px; height:30px; border-radius:8px;
      background:rgba(var(--fg-rgb), 0.05); border:1px solid var(--border);
      color:var(--text-muted); cursor:pointer; font-size:1.05rem;
      display:flex; align-items:center; justify-content:center; transition:var(--transition);
    }
    .drawer-close:hover { color:var(--light); }
    .drawer-user {
      padding:14px 18px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:11px; flex-shrink:0;
    }
    .drawer-user .user-avatar { width:40px; height:40px; font-size:.9rem; }
    .drawer-uname { font-size:.88rem; font-weight:700; color:var(--light); }
    .drawer-role  { font-size:.7rem; color:var(--warning); margin-top:2px; }
    .drawer-nav { flex:1; padding:10px; display:flex; flex-direction:column; gap:3px; }
    .drawer-nav-item {
      display:flex; align-items:center; gap:12px;
      padding:11px 13px; border-radius:11px; cursor:pointer;
      color:var(--text-muted); font-size:0.92rem; font-weight:600;
      border:1px solid transparent; transition:var(--transition);
      background:none; font-family:'Tajawal',sans-serif; width:100%; text-align:right;
    }
    .drawer-nav-item i { font-size:1.1rem; flex-shrink:0; }
    .drawer-nav-item:hover  { color:var(--light); background:rgba(var(--fg-rgb), 0.06); border-color:var(--border); }
    .drawer-nav-item.active { color:var(--accent); background:rgba(78,141,245,0.12); border-color:rgba(78,141,245,0.25); }
    .drawer-footer { padding:12px 10px; border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-logout {
      display:flex; align-items:center; gap:10px;
      padding:11px 13px; border-radius:11px;
      background:rgba(255,59,48,0.08); color:var(--danger);
      border:1px solid rgba(255,59,48,0.18); cursor:pointer;
      font-family:'Tajawal',sans-serif; font-size:0.9rem; font-weight:700;
      transition:var(--transition); width:100%;
    }
    .drawer-logout:hover { background:rgba(255,59,48,0.18); }

    /* ══ MAIN ══ */
    #app-main {
      margin-top:var(--header-h);
      min-height:calc(100vh - var(--header-h));
      padding:36px 36px 80px;
      max-width:1400px; margin-left:auto; margin-right:auto;
      transition:opacity 0.15s ease;
    }

    /* Animations */
    @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes countUp { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    /* ══ DASHBOARD ══ */
    .page-header { margin-bottom:28px; animation:fadeUp 0.5s ease both; }
    .page-header h1 { font-size:1.6rem; font-weight:800; color:var(--light); margin-bottom:4px; }
    .page-header p  { color:var(--text-muted); font-size:0.9rem; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
    .stat-card {
      background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:20px;
      display:flex; flex-direction:column; gap:10px;
      opacity:0; animation:fadeUp 0.5s ease forwards; transition:var(--transition);
    }
    .stat-card:hover { transform:translateY(-5px); border-color:var(--border-hover); box-shadow:0 20px 48px rgba(0,0,0,.45); background:var(--card-hover); }

    /* ── Dashboard "deal" intro (first open per session) — driven by JS ── */
    .dash-deal-deck .stat-card { animation: none !important; will-change: transform, opacity; }

    /* ── Dashboard filters (موحّدة مع الأدمن) ── */
    .dash-daterange { display:flex; align-items:center; gap:6px; background:rgba(var(--fg-rgb), .04); border:1px solid var(--border); border-radius:12px; padding:6px 10px; }
    .dash-date-input { padding:5px 8px; border-radius:8px; border:1.5px solid rgba(var(--fg-rgb), .08); background:rgba(var(--fg-rgb), .06); color:var(--light); font-family:'Tajawal',sans-serif; font-size:.78rem; outline:none; color-scheme:dark; transition:border-color .2s; width:122px; }
    .dash-date-input:focus { border-color:var(--accent); }
    .dash-date-sep { font-size:.73rem; color:var(--text-muted); white-space:nowrap; }
    .dash-apply-btn { padding:5px 12px; border-radius:8px; background:var(--accent); color:#fff; border:none; font-family:'Tajawal',sans-serif; font-size:.78rem; font-weight:700; cursor:pointer; transition:background .18s; white-space:nowrap; display:inline-flex; align-items:center; gap:4px; }
    .dash-apply-btn:hover { background:#3a7de4; }
    .dash-clear-btn { width:27px; height:27px; border-radius:50%; padding:0; flex-shrink:0; background:rgba(255,59,48,.1); color:var(--danger); border:1px solid rgba(255,59,48,.2); cursor:pointer; display:inline-flex; visibility:hidden; align-items:center; justify-content:center; font-size:.85rem; transition:all .18s; }
    .dash-clear-btn:hover { background:rgba(255,59,48,.22); }
    .dash-period-tabs { display:flex; align-items:center; gap:2px; background:rgba(var(--fg-rgb), .04); border:1px solid var(--border); border-radius:12px; padding:4px; }
    .dash-period-btn { padding:5px 13px; border-radius:8px; border:none; background:transparent; color:var(--text-muted); font-family:'Tajawal',sans-serif; font-size:.78rem; font-weight:700; cursor:pointer; transition:all .18s; white-space:nowrap; }
    .dash-period-btn:hover { color:var(--light); background:rgba(var(--fg-rgb), .07); }
    .dash-period-btn.active { background:var(--accent); color:#fff; box-shadow:0 2px 10px rgba(78,141,245,.35); }
    .nd-toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:22px; }
    .nd-toolbar .dash-period-chip { margin-right:auto; }
    .dash-period-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:20px; background:rgba(78,141,245,.1); border:1px solid rgba(78,141,245,.18); color:var(--accent); font-size:.72rem; font-weight:700; }
    .proj-chip { display:inline-flex; align-items:center; gap:5px; font-size:.69rem; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; }
    .proj-chip b { font-weight:800; }
    .proj-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .stat-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .stat-icon { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .stat-number { font-size:2.2rem; font-weight:800; line-height:1; animation:countUp .6s ease both; }
    .stat-label  { font-size:.78rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
    .stat-card.blue   .stat-icon   { background:rgba(78,141,245,.15); color:var(--accent); }
    .stat-card.green  .stat-icon   { background:rgba(52,199,89,.15);  color:var(--success); }
    .stat-card.yellow .stat-icon   { background:rgba(255,204,0,.15);  color:var(--warning); }
    .stat-card.red    .stat-icon   { background:rgba(255,59,48,.15);  color:var(--danger); }
    .stat-card.purple .stat-icon   { background:rgba(175,82,222,.15); color:#af52de; }
    .stat-card.teal   .stat-icon   { background:rgba(90,200,250,.15);  color:#5ac8fa; }
    .stat-card.blue   .stat-number { color:var(--accent); }
    .stat-card.green  .stat-number { color:var(--success); }
    .stat-card.yellow .stat-number { color:var(--warning); }
    .stat-card.red    .stat-number { color:var(--danger); }
    .stat-card.purple .stat-number { color:#af52de; }
    .stat-card.teal   .stat-number { color:#5ac8fa; }
    .bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:900px) { #bm-fin { grid-template-columns:1fr 1fr !important; } }
    @media (max-width:860px) { .bottom-grid { grid-template-columns:1fr; } }
    @media (max-width:480px) { #bm-fin { grid-template-columns:1fr !important; } }
    .panel {
      background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:22px;
      opacity:0; animation:fadeUp .5s ease forwards; animation-delay:.35s;
    }
    .panel-title { font-size:.95rem; font-weight:700; color:var(--light); margin-bottom:18px; display:flex; align-items:center; gap:8px; }
    .panel-title i { color:var(--text-muted); }
    .prog-item { margin-bottom:16px; }
    .prog-item:last-child { margin-bottom:0; }
    .prog-header { display:flex; justify-content:space-between; margin-bottom:7px; font-size:.84rem; font-weight:600; }
    .prog-track { height:7px; background:rgba(var(--fg-rgb), .06); border-radius:20px; overflow:hidden; }
    .prog-fill  { height:100%; border-radius:20px; transition:width 1s ease; }
    .ring-container { position:relative; width:120px; height:120px; flex-shrink:0; }
    .ring-svg  { transform:rotate(-90deg); }
    .ring-bg   { fill:none; stroke:rgba(var(--fg-rgb), .06); stroke-width:10; }
    .ring-fill { fill:none; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1.2s ease; }
    .ring-label { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .ring-pct { font-size:1.5rem; font-weight:800; line-height:1; }
    .ring-sub { font-size:.68rem; color:var(--text-muted); margin-top:3px; }
    .occupancy-wrapper { display:flex; align-items:center; gap:24px; }
    .legend-list { display:flex; flex-direction:column; gap:9px; }
    .legend-row  { display:flex; align-items:center; gap:8px; font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .legend-dot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .legend-row strong { color:var(--light); margin-right:auto; }
    .skel { background:linear-gradient(90deg,rgba(var(--fg-rgb), .04) 25%,rgba(var(--fg-rgb), .08) 50%,rgba(var(--fg-rgb), .04) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:16px; }

    /* ══ RESPONSIVE ══ */
    @media (max-width:1100px) { .nav-tab span{display:none} .nav-tab{padding:8px 10px} }
    @media (max-width:768px) {
      #app-header { padding:0 16px; }
      .header-nav,.logout-btn,.user-name,.header-divider { display:none; }
      .hamburger { display:flex; }
      #app-main { padding:20px 16px 80px; }
      .stats-grid { grid-template-columns:repeat(2,1fr); gap:12px; }
      .stat-number { font-size:1.7rem; }
      .bottom-grid { grid-template-columns:1fr; }
      .occupancy-wrapper { flex-direction:column; align-items:flex-start; }
    }
    @media (max-width:400px) { .stats-grid{grid-template-columns:1fr 1fr;gap:10px} }
    @media (min-width:1600px) { #app-main { max-width:1600px; margin-right:auto; margin-left:auto; } }
    @media (min-width:2000px) { #app-main { max-width:1900px; } }
  </style>
  <link rel="stylesheet" href="config/light-overrides.css"/>
  <link rel="stylesheet" href="config/polish.css"/>
  <script src="config/scroll-lock.js" defer></script>
  <script src="config/themes.js"></script>
  <script src="config/brand.js"></script>
  <script src="config/realtime.js" defer></script>
  <script src="config/notification-bell.js" defer></script>
  <script src="config/send-notification.js" defer></script>
</head>
<body>

<header id="app-header"></header>

<div id="drawer-overlay" onclick="closeDrawer()"></div>
<nav id="mobile-drawer">
  <div class="drawer-header">
    <span class="drawer-logo">نظام إدارة العقارات</span>
    <button class="drawer-close" onclick="closeDrawer()"><i class="ri-close-line"></i></button>
  </div>
  <div class="drawer-user">
    <div class="user-avatar" id="d-avatar">م</div>
    <div>
      <div class="drawer-uname" id="d-uname">—</div>
      <div class="drawer-role">مدير الحجوزات</div>
    </div>
  </div>
  <div class="drawer-nav" id="d-nav"></div>
  <div class="drawer-footer">
    <button class="drawer-logout" onclick="handleLogout()">
      <i class="ri-logout-box-r-line"></i> تسجيل الخروج
    </button>
  </div>
</nav>

<main id="app-main">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
    <div style="width:36px;height:36px;border:3px solid rgba(var(--fg-rgb), 0.08);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite"></div>
  </div>
</main>

<!-- Layout + Router -->
<script src="layout.js?v=17"></script>
<script src="router.js?v=17"></script>

<!-- Dashboard data loader -->
<script>
window.__bmDashboardHTML = `
  <div style="display:flex;align-items:center;gap:9px;margin-bottom:16px">
    <i class="ri-dashboard-3-line" style="color:var(--accent);font-size:1.35rem"></i>
    <h1 style="font-size:1.45rem;font-weight:800;margin:0;color:var(--light)">لوحة إدارة الحجوزات</h1>
  </div>
  <div class="nd-toolbar">
    <div class="dash-period-tabs">
      <button class="dash-period-btn" data-bmp="today" onclick="window.__bmPeriod('today')">اليوم</button>
      <button class="dash-period-btn" data-bmp="month" onclick="window.__bmPeriod('month')">شهر</button>
      <button class="dash-period-btn" data-bmp="year"  onclick="window.__bmPeriod('year')">سنة</button>
      <button class="dash-period-btn active" data-bmp="all" onclick="window.__bmPeriod('all')">الكل</button>
    </div>
    <div class="dash-daterange">
      <span class="dash-date-sep">من</span>
      <input type="date" id="bm-from" class="dash-date-input">
      <span class="dash-date-sep">إلى</span>
      <input type="date" id="bm-to" class="dash-date-input">
      <button class="dash-apply-btn" onclick="window.__bmApplyDate()"><i class="ri-filter-3-line"></i></button>
      <button class="dash-clear-btn" id="bm-clear" onclick="window.__bmClearDate()"><i class="ri-close-line"></i></button>
    </div>
    <span class="dash-period-chip"><i class="ri-calendar-line"></i> <span id="bm-period-chip">جميع الأوقات</span></span>
  </div>
  <div class="stats-grid" id="dash-stats">
    ${Array(6).fill('<div class="skel" style="height:106px"></div>').join('')}
  </div>

  <div style="font-size:.7rem;font-weight:800;color:rgba(143,163,192,.6);text-transform:uppercase;letter-spacing:.7px;margin:20px 0 10px;display:flex;align-items:center;gap:7px">
    <span style="flex:1;height:1px;background:rgba(var(--fg-rgb), .07)"></span>
    <i class="ri-money-dollar-circle-line" style="font-size:.85rem"></i> المبيعات والإيرادات
    <span style="flex:1;height:1px;background:rgba(var(--fg-rgb), .07)"></span>
  </div>
  <div id="bm-fin" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
    ${Array(4).fill('<div class="skel" style="height:88px;border-radius:14px"></div>').join('')}
  </div>

  <div style="font-size:.7rem;font-weight:800;color:rgba(143,163,192,.6);text-transform:uppercase;letter-spacing:.7px;margin:4px 0 12px;display:flex;align-items:center;gap:7px">
    <span style="flex:1;height:1px;background:rgba(var(--fg-rgb), .07)"></span>
    <i class="ri-layout-grid-line" style="font-size:.85rem"></i> التفاصيل
    <span style="flex:1;height:1px;background:rgba(var(--fg-rgb), .07)"></span>
  </div>
  <div class="bottom-grid" id="dash-bottom">
    <div class="skel" style="height:280px"></div>
    <div class="skel" style="height:280px"></div>
    <div class="skel" style="height:240px"></div>
    <div class="skel" style="height:240px"></div>
  </div>
`;

/* ══ BookingManager Dashboard ══ */
(function(){
  const API=window.location.origin;
  function tok(){ try{return JSON.parse(localStorage.getItem('authData')||'{}').token||'';}catch{return '';} }
  async function get(p){ const r=await fetch(API+p,{headers:{'Authorization':'Bearer '+tok()}}); if(!r.ok) throw new Error(r.status); return r.json().catch(()=>null); }
  function arr(v){ return Array.isArray(v)?v:(v?.['$values']||v?.data||v?.items||v?.value||[]); }
  function toSt(v){ if(typeof v==='number')return v; return{available:1,reserved:2,sold:3,closed:4,Available:1,Reserved:2,Sold:3,Closed:4}[v]??4; }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtM(v){ const n=Number(v); if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+' مليون'; if(n>=1e3)return (n/1e3).toFixed(0)+' ألف'; return n.toLocaleString('en-US'); }
  function fmtD(d){ if(!d)return '—'; try{return new Date(d).toLocaleDateString('ar-EG',{month:'short',day:'numeric'});}catch{return '—';} }
  function inits(n){ if(!n)return '؟'; const p=n.trim().split(' '); return ((p[0]||'').charAt(0)+(p[1]||'').charAt(0)).toUpperCase()||'؟'; }
  function periodLabel(p){ return{today:'اليوم',month:'هذا الشهر',year:'هذه السنة',all:'جميع الأوقات'}[p]||'مخصص'; }
  /* "توزيع الكوتشينة": الكروت تطير من كومة فوق يمين الشبكة لمكانها بالتتابع */
  function _dealCards(grid){
    const cards=Array.from(grid.children);
    if(!cards.length) return;
    const gr=grid.getBoundingClientRect();
    const deckX=gr.right-36, deckY=gr.top-12;
    cards.forEach(card=>{
      const cr=card.getBoundingClientRect();
      const dx=deckX-(cr.left+cr.width/2), dy=deckY-(cr.top+cr.height/2), rot=(Math.random()*12-6);
      card.style.transition='none'; card.style.opacity='0';
      card.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg) scale(.72)`;
    });
    void grid.offsetWidth;
    cards.forEach((card,i)=>{
      const d=70+i*80;
      card.style.transition=`transform .72s cubic-bezier(.16,1,.3,1) ${d}ms, opacity .5s ease ${d}ms`;
      card.style.opacity='1'; card.style.transform='translate(0,0) rotate(0) scale(1)';
    });
    setTimeout(()=>{ cards.forEach(c=>{ c.style.transition=''; c.style.transform=''; }); }, 70+cards.length*80+800);
  }

  let _raw=null, _from='', _to='', _period='all', _dealNext=false;

  function filterRange(items,field){
    if(!_from&&!_to) return items;
    return items.filter(i=>{
      const d=i[field]||i[field.charAt(0).toUpperCase()+field.slice(1)];
      if(!d) return false;
      const dt=new Date(d);
      if(_from&&dt<new Date(_from)) return false;
      if(_to&&dt>new Date(_to+' 23:59:59')) return false;
      return true;
    });
  }

  function setPeriod(p){
    const now=new Date(), pad=s=>String(s).padStart(2,'0');
    const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const today=fmt(now);
    if(p==='all'){_from='';_to='';}
    else if(p==='today'){_from=today;_to=today;}
    else if(p==='month'){_from=fmt(new Date(now.getFullYear(),now.getMonth(),1));_to=today;}
    else if(p==='year'){_from=fmt(new Date(now.getFullYear(),0,1));_to=today;}
    const fi=document.getElementById('bm-from'), ti=document.getElementById('bm-to');
    if(fi)fi.value=_from; if(ti)ti.value=_to;
    const cb=document.getElementById('bm-clear');
    if(cb)cb.style.visibility=(_from||_to)?'visible':'hidden';
  }

  function syncPeriodBtns(active){
    document.querySelectorAll('[data-bmp]').forEach(b=>{
      b.classList.toggle('active', b.dataset.bmp===active);
    });
    const chip=document.getElementById('bm-period-chip');
    if(chip)chip.textContent=(_from||_to)?`${_from||'—'} ← ${_to||'—'}`:periodLabel(active);
  }

  async function render(){
    if(!_raw){
      const[pd,ud,byd,bkd,fld,bld]=await Promise.all([
        get('/api/Projects').catch(()=>null),
        get('/api/Units').catch(()=>null),
        get('/api/Buyers').catch(()=>null),
        get('/api/Bookings').catch(()=>null),
        get('/api/Floors').catch(()=>null),
        get('/api/Buildings').catch(()=>null),
      ]);
      /* خريطة الطابق → المشروع لربط الوحدات بمشاريعها */
      const _bldProj={}; arr(bld).forEach(b=>{ _bldProj[String(b.id||b.Id)]=String(b.projectId||b.ProjectId||''); });
      const _flProj={};  arr(fld).forEach(f=>{ _flProj[String(f.id||f.Id)]=_bldProj[String(f.buildingId||f.BuildingId||'')]||''; });
      const _U=arr(ud).map(u=>({...u, _projId:_flProj[String(u.floorId||u.FloorId||'')]||''}));
      _raw={P:arr(pd),U:_U,BY:arr(byd),BK:arr(bkd)};
    }
    const{P,U,BY,BK}=_raw;
    const bkF=filterRange(BK,'createdAt');
    const byF=filterRange(BY,'createdAt');

    const avail=U.filter(u=>toSt(u.status??u.Status)===1).length;
    const resrv=U.filter(u=>toSt(u.status??u.Status)===2).length;
    const sold=U.filter(u=>toSt(u.status??u.Status)===3).length;
    const closd=U.filter(u=>toSt(u.status??u.Status)===4).length;
    const total=U.length;
    const occ=total?Math.round((resrv+sold)/total*100):0;
    /* إجمالي المبيعات = وحدات مباعة فقط */
    const totalSales=U.filter(u=>toSt(u.status??u.Status)===3).reduce((s,u)=>s+Number(u.price||0),0);
    /* المبيعات المتوقعة = وحدات محجوزة فقط */
    const totalExpected=U.filter(u=>toSt(u.status??u.Status)===2).reduce((s,u)=>s+Number(u.price||0),0);

    const statsEl=document.getElementById('dash-stats');
    if(!statsEl)return;
    const cards=[
      {cls:'blue',  icon:'ri-home-4-line',         num:P.length,   lbl:'المشاريع',         sub:P.length===1?'مشروع واحد':P.length+' مشاريع'},
      {cls:'blue',  icon:'ri-layout-grid-line',     num:total,      lbl:'إجمالي الوحدات',   sub:`${avail} متاح · ${resrv} محجوز · ${sold} مباع`},
      {cls:'green', icon:'ri-checkbox-circle-line', num:avail,      lbl:'متاح',             sub:`${total?Math.round(avail/total*100):0}% من الإجمالي`},
      {cls:'yellow',icon:'ri-time-line',            num:resrv,      lbl:'محجوز',            sub:`${total?Math.round(resrv/total*100):0}% من الإجمالي`},
      {cls:'red',   icon:'ri-price-tag-3-line',     num:sold,       lbl:'مباع',             sub:`${total?Math.round(sold/total*100):0}% من الإجمالي`},
      {cls:'purple',icon:'ri-group-line',           num:BY.length,  lbl:'إجمالي العملاء',  sub:byF.length?`+${byF.length} في الفترة`:''},
    ];
    statsEl.innerHTML=cards.map((c,i)=>`
      <div class="stat-card ${c.cls}" style="animation-delay:${i*50}ms">
        <div class="stat-top">
          <div>
            <div class="stat-number">${c.num.toLocaleString('en-US')}</div>
            <div class="stat-label">${c.lbl}</div>
            ${c.sub?`<div style="font-size:.7rem;color:var(--text-muted);margin-top:2px">${c.sub}</div>`:''}
          </div>
          <div class="stat-icon"><i class="${c.icon}"></i></div>
        </div>
      </div>`).join('');
    /* أنيميشن "توزيع الكوتشينة" — كل ما تفتح الداشبورد (مش مع تغيير الفلتر) */
    statsEl.classList.remove('dash-deal-deck');
    try{
      const _reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if(!_reduce&&_dealNext){
        _dealNext=false;
        statsEl.classList.add('dash-deal-deck');
        requestAnimationFrame(()=>_dealCards(statsEl));
      }
    }catch{}

    /* ── Financial summary bar (4 chips) ── */
    const finWrap=document.getElementById('bm-fin');
    if(finWrap){
      const avgSale=sold>0?totalSales/sold:0;
      finWrap.innerHTML=[
        {cls:'#34c759',lbl:'إجمالي المبيعات',       val:totalSales?fmtM(totalSales)+' '+window.CUR():'—',              sub:sold+' وحدة مباعة'},
        {cls:'#ffcc00',lbl:'المبيعات المتوقعة',      val:totalExpected?fmtM(totalExpected)+' '+window.CUR():'—',        sub:resrv+' وحدة محجوزة'},
        {cls:'#4e8df5',lbl:'متوسط سعر الوحدة المباعة',val:avgSale?fmtM(Math.round(avgSale))+' '+window.CUR():'—',      sub:'على الوحدات المباعة'},
        {cls:'#af52de',lbl:'نسبة الإشغال',           val:occ+'%',                                             sub:resrv+sold+' وحدة محجوزة أو مباعة'},
      ].map((f,i)=>`
        <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:5px;opacity:0;animation:fadeUp .45s ease forwards;animation-delay:${i*60}ms;position:relative;overflow:hidden">
          <div style="position:absolute;top:0;right:0;left:0;height:2.5px;background:${f.cls};border-radius:14px 14px 0 0"></div>
          <div style="font-size:.68rem;color:var(--text-muted);font-weight:700;letter-spacing:.3px">${f.lbl}</div>
          <div style="font-size:1.4rem;font-weight:800;color:${f.cls};line-height:1.15">${f.val}</div>
          <div style="font-size:.7rem;color:var(--text-muted)">${f.sub}</div>
        </div>`).join('');
    }

    /* bottom panels */
    const circ=2*Math.PI*52;
    const bottomEl=document.getElementById('dash-bottom');
    if(!bottomEl)return;

    /* unit dist bars */
    const distBars=[
      {lbl:'متاح', num:avail, col:'var(--success)'},
      {lbl:'محجوز',num:resrv, col:'var(--warning)'},
      {lbl:'مباع', num:sold,  col:'var(--danger)'},
      {lbl:'مقفول',num:closd, col:'#6b7a8d'},
    ].map(x=>{
      const pct=total?Math.round(x.num/total*100):0;
      return `<div class="prog-item">
        <div class="prog-header"><span style="color:var(--light)">${x.lbl}</span><span style="color:var(--text-muted)">${pct}% <strong style="color:var(--light)">${x.num}</strong></span></div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${x.col};transition:width 1s ease"></div></div>
      </div>`;
    }).join('');

    /* project bars — مقسّم حسب الحالة، مع اسم كل مشروع (مبني على ربط الطابق→المشروع) */
    const projUnitMap={};
    U.forEach(u=>{
      const pid=String(u._projId||u.projectId||u.ProjectId||'');
      if(!projUnitMap[pid])projUnitMap[pid]={total:0,sold:0,resrv:0,avail:0,closed:0};
      projUnitMap[pid].total++;
      const st=toSt(u.status??u.Status);
      if(st===1)projUnitMap[pid].avail++;
      else if(st===2)projUnitMap[pid].resrv++;
      else if(st===3)projUnitMap[pid].sold++;
      else if(st===4)projUnitMap[pid].closed++;
    });
    const topProjects=P.map(p=>({name:p.name||'—',...(projUnitMap[String(p.id)]||{total:0,sold:0,resrv:0,avail:0,closed:0})}))
      .filter(p=>p.total>0).sort((a,b)=>b.total-a.total).slice(0,5);
    const projBars=topProjects.map((p)=>{
      const t=p.total||0, soldPct=t?Math.round(p.sold/t*100):0;
      const sw=t?(p.sold/t*100):0, rw=t?(p.resrv/t*100):0, aw=t?(p.avail/t*100):0, cw=t?((p.closed||0)/t*100):0;
      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;gap:8px">
          <span style="font-size:.83rem;font-weight:700;color:var(--light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name||'—')}</span>
          <span style="font-size:.74rem;color:var(--text-muted);white-space:nowrap">${t} وحدة &bull; مباع ${soldPct}%</span>
        </div>
        <div style="display:flex;height:9px;border-radius:6px;overflow:hidden;background:rgba(var(--fg-rgb),.06)">
          ${sw?`<div title="مباع ${p.sold}" style="width:${sw}%;background:var(--danger);transition:width .9s ease"></div>`:''}
          ${rw?`<div title="محجوز ${p.resrv}" style="width:${rw}%;background:var(--warning);transition:width .9s ease"></div>`:''}
          ${aw?`<div title="متاح ${p.avail}" style="width:${aw}%;background:var(--success);transition:width .9s ease"></div>`:''}
          ${cw?`<div title="مقفول ${p.closed}" style="width:${cw}%;background:#6b7a8d;transition:width .9s ease"></div>`:''}
        </div>
        <div style="display:flex;gap:7px;margin-top:8px;flex-wrap:wrap">
          <span class="proj-chip" style="background:rgba(255,59,48,.1);color:var(--danger)"><span class="proj-dot" style="background:var(--danger)"></span><b>${p.sold}</b> مباع</span>
          <span class="proj-chip" style="background:rgba(255,204,0,.1);color:var(--warning)"><span class="proj-dot" style="background:var(--warning)"></span><b>${p.resrv}</b> محجوز</span>
          <span class="proj-chip" style="background:rgba(52,199,89,.1);color:var(--success)"><span class="proj-dot" style="background:var(--success)"></span><b>${p.avail}</b> متاح</span>
          ${(p.closed||0)?`<span class="proj-chip" style="background:rgba(107,122,141,.16);color:#9aa7b8"><span class="proj-dot" style="background:#6b7a8d"></span><b>${p.closed}</b> مقفول</span>`:''}
        </div>
      </div>`;
    }).join('');

    /* recent bookings */
    const unitMap={}; U.forEach(u=>{unitMap[u.id]=u;});
    const buyerMap={}; BY.forEach(b=>{buyerMap[b.id]=b;});
    const recent=[...bkF].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,7);
    const bkRows=recent.length?recent.map(bk=>{
      const buyer=buyerMap[bk.buyerId||bk.BuyerId];
      const unit=unitMap[bk.unitId||bk.UnitId];
      const bName=buyer?((buyer.fullName||buyer.firstName+' '+buyer.lastName).trim()):bk.buyerName||'—';
      const uNum=unit?`وحدة ${unit.unitNumber||unit.UnitNumber||''}`:bk.unitId?`#${bk.unitId}`:'—';
      const price=Number(bk.price||bk.totalPrice||unit?.price||0);
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#2563eb);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:#fff;flex-shrink:0">${inits(bName)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.84rem;font-weight:700;color:var(--light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(bName)}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">${esc(uNum)}</div>
        </div>
        ${price?`<div style="font-size:.8rem;font-weight:800;color:var(--success);white-space:nowrap;padding-right:8px">${fmtM(price)} ${window.CUR()}</div>`:''}
        <div style="font-size:.7rem;color:var(--text-muted);white-space:nowrap">${fmtD(bk.createdAt)}</div>
      </div>`;
    }).join('')
    :`<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:.85rem"><i class="ri-calendar-2-line" style="display:block;font-size:2rem;margin-bottom:8px;opacity:.3"></i>لا توجد حجوزات في هذه الفترة</div>`;

    bottomEl.innerHTML=`
      <div class="panel" style="animation-delay:.1s">
        <div class="panel-title"><i class="ri-pie-chart-2-line"></i> نسبة الإشغال</div>
        <div class="occupancy-wrapper">
          <div class="ring-container">
            <svg class="ring-svg" viewBox="0 0 120 120" width="120" height="120">
              <circle class="ring-bg" cx="60" cy="60" r="52"/>
              <circle id="bm-ring" class="ring-fill" cx="60" cy="60" r="52" stroke="var(--accent)"
                stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${circ.toFixed(2)}"
                style="transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)"/>
            </svg>
            <div class="ring-label">
              <div id="bm-ring-pct" class="ring-pct" style="color:var(--accent)">0%</div>
              <div class="ring-sub">مشغول</div>
            </div>
          </div>
          <div class="legend-list">
            <div class="legend-row"><div class="legend-dot" style="background:var(--success)"></div>متاح<strong>${avail}</strong></div>
            <div class="legend-row"><div class="legend-dot" style="background:var(--warning)"></div>محجوز<strong>${resrv}</strong></div>
            <div class="legend-row"><div class="legend-dot" style="background:var(--danger)"></div>مباع<strong>${sold}</strong></div>
          </div>
        </div>
      </div>
      <div class="panel" style="animation-delay:.18s">
        <div class="panel-title"><i class="ri-bar-chart-2-line"></i> توزيع الوحدات</div>
        ${total>0?distBars:'<p style="color:var(--text-muted)">لا توجد بيانات</p>'}
      </div>
      <div class="panel" style="animation-delay:.26s">
        <div class="panel-title"><i class="ri-building-4-line"></i> أداء المشاريع</div>
        ${projBars||'<p style="color:var(--text-muted)">لا توجد مشاريع</p>'}
      </div>
      <div class="panel" style="animation-delay:.34s">
        <div class="panel-title"><i class="ri-calendar-check-line"></i> آخر الحجوزات <span style="font-size:.72rem;color:var(--text-muted);font-weight:400">(${periodLabel(_period)})</span></div>
        ${bkRows}
      </div>`;

    /* animate ring */
    requestAnimationFrame(()=>setTimeout(()=>{
      const off=circ-(occ/100)*circ;
      const ring=document.getElementById('bm-ring');
      const pctEl=document.getElementById('bm-ring-pct');
      if(ring)ring.style.strokeDashoffset=off;
      if(pctEl){
        const dur=900,s=performance.now();
        function step(now){
          const t=Math.min((now-s)/dur,1),ease=1-Math.pow(1-t,3);
          pctEl.textContent=Math.round(occ*ease)+'%';
          if(t<1)requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }
    },120));
  }

  window.__bmLoadDashboard=async function(){
    _raw=null;_period='all';_from='';_to='';_dealNext=true;
    syncPeriodBtns('all');
    try{await render();}catch(e){console.error('BM Dashboard:',e);}
  };
  window.__bmPeriod=async function(p){
    _period=p; setPeriod(p); syncPeriodBtns(p);
    try{await render();}catch(e){console.error(e);}
  };
  window.__bmApplyDate=async function(){
    const fi=document.getElementById('bm-from'),ti=document.getElementById('bm-to');
    _from=fi?fi.value:''; _to=ti?ti.value:''; _period='all';
    const cb=document.getElementById('bm-clear');
    if(cb)cb.style.visibility=(_from||_to)?'visible':'hidden';
    syncPeriodBtns('');
    try{await render();}catch(e){console.error(e);}
  };
  window.__bmClearDate=async function(){
    _from='';_to='';_period='all';
    const fi=document.getElementById('bm-from'),ti=document.getElementById('bm-to');
    if(fi)fi.value=''; if(ti)ti.value='';
    const cb=document.getElementById('bm-clear');
    if(cb)cb.style.visibility='hidden';
    syncPeriodBtns('all');
    try{await render();}catch(e){console.error(e);}
  };
})();
</script>
